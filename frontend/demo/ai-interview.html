<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI面试官 - 模拟面试</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --white: #ffffff;
            --black: #000000;
            --gray-50: #fafafa;
            --gray-100: #f5f5f5;
            --gray-200: #e5e5e5;
            --gray-300: #d4d4d4;
            --gray-400: #a3a3a3;
            --gray-500: #737373;
            --gray-600: #525252;
            --gray-700: #404040;
            --gray-800: #262626;
            --gray-900: #171717;
            --success: #22c55e;
            --warning: #eab308;
            --error: #ef4444;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--white);
            min-height: 100vh;
            color: var(--gray-900);
            line-height: 1.6;
        }

        .container {
            display: flex;
            min-height: 100vh;
        }

        /* 左侧导航栏 */
        .sidebar {
            width: 72px;
            min-width: 72px;
            background: var(--white);
            border-right: 1px solid var(--gray-200);
            padding: 24px 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 100;
        }

        .sidebar-avatar {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: var(--gray-900);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 28px;
        }

        .sidebar-avatar svg {
            width: 22px;
            height: 22px;
            fill: var(--white);
        }

        .nav-back {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: var(--gray-100);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
        }

        .nav-back:hover {
            background: var(--gray-200);
        }

        .nav-back svg {
            width: 18px;
            height: 18px;
            fill: var(--gray-600);
        }

        .nav-divider {
            width: 24px;
            height: 1px;
            background: var(--gray-200);
            margin-bottom: 24px;
        }

        .quick-nav {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
        }

        .quick-nav-item {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: var(--gray-100);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }

        .quick-nav-item:hover {
            background: var(--gray-200);
        }

        .quick-nav-item svg {
            width: 18px;
            height: 18px;
            fill: var(--gray-500);
        }

        .quick-nav-item .tooltip {
            position: absolute;
            left: 52px;
            background: var(--gray-900);
            color: var(--white);
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 11px;
            white-space: nowrap;
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s ease;
            z-index: 1000;
        }

        .quick-nav-item:hover .tooltip {
            opacity: 1;
            visibility: visible;
        }

        /* 主内容区 */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 上半部分 - 岗位信息 - 10% */
        .job-header {
            height: 72px;
            min-height: 72px;
            padding: 0 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--gray-200);
            background: var(--white);
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .job-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .job-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: var(--gray-100);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .job-icon svg {
            width: 20px;
            height: 20px;
            fill: var(--gray-600);
        }

        .job-details {
            display: flex;
            flex-direction: column;
        }

        .job-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--gray-900);
        }

        .job-company {
            font-size: 12px;
            color: var(--gray-400);
        }

        .job-actions {
            display: flex;
            gap: 8px;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-primary {
            background: var(--gray-900);
            color: var(--white);
            border: none;
        }

        .btn-primary:hover {
            background: var(--gray-800);
        }

        .btn-secondary {
            background: var(--white);
            color: var(--gray-600);
            border: 1px solid var(--gray-200);
        }

        .btn-secondary:hover {
            border-color: var(--gray-400);
            color: var(--gray-900);
        }

        .btn svg {
            width: 14px;
            height: 14px;
            fill: currentColor;
        }

        /* 下半部分 - 主要内容区 */
        .content-section {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* 左侧问答区域 - 70% */
        .qa-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--gray-200);
            animation: slideInLeft 0.4s ease 0.1s both;
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .qa-header {
            padding: 16px 24px;
            border-bottom: 1px solid var(--gray-200);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .qa-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--gray-900);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .qa-title-icon {
            width: 24px;
            height: 24px;
            border-radius: 6px;
            background: var(--gray-100);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .qa-title-icon svg {
            width: 14px;
            height: 14px;
            fill: var(--gray-600);
        }

        .qa-progress {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--gray-400);
        }

        .progress-bar {
            width: 120px;
            height: 4px;
            background: var(--gray-200);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--gray-900);
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        .qa-content {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* 面试消息 */
        .interview-message {
            display: flex;
            gap: 12px;
            max-width: 85%;
            animation: fadeIn 0.3s ease;
        }

        .interview-message.ai {
            align-self: flex-start;
        }

        .interview-message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .interview-message.ai .message-avatar {
            background: var(--gray-900);
        }

        .interview-message.user .message-avatar {
            background: var(--gray-300);
        }

        .message-avatar svg {
            width: 16px;
            height: 16px;
            fill: var(--white);
        }

        .message-content {
            padding: 14px 18px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.6;
        }

        .interview-message.ai .message-content {
            background: var(--gray-50);
            border: 1px solid var(--gray-200);
            color: var(--gray-700);
        }

        .interview-message.user .message-content {
            background: var(--gray-900);
            color: var(--white);
        }

        .message-content p {
            margin-bottom: 8px;
        }

        .message-content p:last-child {
            margin-bottom: 0;
        }

        .message-content strong {
            font-weight: 600;
        }

        .question-number {
            font-size: 11px;
            color: var(--gray-400);
            margin-bottom: 8px;
            font-weight: 500;
        }

        /* 输入区域 */
        .qa-input {
            padding: 16px 24px;
            border-top: 1px solid var(--gray-200);
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .input-wrapper {
            flex: 1;
            background: var(--gray-50);
            border-radius: 12px;
            border: 1px solid var(--gray-200);
            transition: all 0.2s ease;
            overflow: hidden;
        }

        .input-wrapper:focus-within {
            border-color: var(--gray-400);
            background: var(--white);
        }

        .input-wrapper textarea {
            width: 100%;
            padding: 14px 16px;
            border: none;
            background: transparent;
            resize: none;
            font-size: 14px;
            line-height: 1.5;
            font-family: 'Inter', sans-serif;
            outline: none;
            min-height: 44px;
            max-height: 120px;
            color: var(--gray-900);
        }

        .input-wrapper textarea::placeholder {
            color: var(--gray-400);
        }

        .input-actions {
            display: flex;
            gap: 6px;
            padding: 0 8px 8px;
        }

        .input-action-btn {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            border: none;
            background: var(--gray-200);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .input-action-btn:hover {
            background: var(--gray-300);
        }

        .input-action-btn svg {
            width: 16px;
            height: 16px;
            fill: var(--gray-600);
        }

        .send-btn {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            border: none;
            background: var(--gray-900);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .send-btn:hover {
            background: var(--gray-800);
        }

        .send-btn svg {
            width: 18px;
            height: 18px;
            fill: var(--white);
        }

        /* 右侧AI分析区域 - 30% */
        .analysis-section {
            width: 30%;
            min-width: 280px;
            background: var(--gray-50);
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
            animation: slideInRight 0.4s ease 0.2s both;
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .analysis-section.collapsed {
            width: 0;
            min-width: 0;
            overflow: hidden;
        }

        .analysis-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--gray-200);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--white);
        }

        .analysis-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--gray-900);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .analysis-title-icon {
            width: 24px;
            height: 24px;
            border-radius: 6px;
            background: var(--gray-100);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .analysis-title-icon svg {
            width: 14px;
            height: 14px;
            fill: var(--gray-600);
        }

        .toggle-btn {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            border: none;
            background: var(--gray-100);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .toggle-btn:hover {
            background: var(--gray-200);
        }

        .toggle-btn svg {
            width: 14px;
            height: 14px;
            fill: var(--gray-500);
            transition: transform 0.2s ease;
        }

        .analysis-section.collapsed .toggle-btn svg {
            transform: rotate(180deg);
        }

        .analysis-content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* 答案展示 */
        .answer-card {
            background: var(--white);
            border: 1px solid var(--gray-200);
            border-radius: 12px;
            padding: 16px;
        }

        .answer-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .answer-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--gray-500);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .answer-score {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            font-weight: 600;
        }

        .answer-score.high {
            color: var(--success);
        }

        .answer-score.medium {
            color: var(--warning);
        }

        .answer-score.low {
            color: var(--error);
        }

        .answer-content {
            font-size: 13px;
            color: var(--gray-600);
            line-height: 1.6;
        }

        .answer-content p {
            margin-bottom: 8px;
        }

        .answer-content p:last-child {
            margin-bottom: 0;
        }

        /* AI分析 */
        .analysis-card {
            background: var(--white);
            border: 1px solid var(--gray-200);
            border-radius: 12px;
            padding: 16px;
        }

        .analysis-card-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }

        .analysis-card-icon {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            background: var(--gray-100);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .analysis-card-icon svg {
            width: 12px;
            height: 12px;
            fill: var(--gray-600);
        }

        .analysis-card-title {
            font-size: 12px;
            font-weight: 600;
            color: var(--gray-700);
        }

        .analysis-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 12px;
        }

        .analysis-item:last-child {
            margin-bottom: 0;
        }

        .analysis-item-icon {
            width: 16px;
            height: 16px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .analysis-item-icon.positive {
            background: #f0fdf4;
        }

        .analysis-item-icon.positive svg {
            fill: var(--success);
        }

        .analysis-item-icon.negative {
            background: #fef2f2;
        }

        .analysis-item-icon.negative svg {
            fill: var(--error);
        }

        .analysis-item-icon.neutral {
            background: var(--gray-100);
        }

        .analysis-item-icon.neutral svg {
            fill: var(--gray-500);
        }

        .analysis-item-icon svg {
            width: 10px;
            height: 10px;
        }

        .analysis-item-text {
            font-size: 12px;
            color: var(--gray-600);
            line-height: 1.5;
        }

        /* 评分展示 */
        .score-section {
            background: var(--white);
            border: 1px solid var(--gray-200);
            border-radius: 12px;
            padding: 16px;
        }

        .score-header {
            font-size: 12px;
            font-weight: 600;
            color: var(--gray-500);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 12px;
        }

        .score-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .score-item {
            text-align: center;
            padding: 10px;
            background: var(--gray-50);
            border-radius: 8px;
        }

        .score-value {
            font-size: 20px;
            font-weight: 700;
            color: var(--gray-900);
            letter-spacing: -0.02em;
        }

        .score-label {
            font-size: 10px;
            color: var(--gray-400);
            margin-top: 2px;
        }

        /* 响应式设计 */
        @media (max-width: 1200px) {
            .analysis-section {
                width: 35%;
                min-width: 240px;
            }
        }

        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                bottom: 0;
                width: 64px;
                z-index: 1000;
            }

            .main-content {
                margin-left: 64px;
            }

            .content-section {
                flex-direction: column;
            }

            .qa-section {
                border-right: none;
                border-bottom: 1px solid var(--gray-200);
            }

            .analysis-section {
                width: 100%;
                min-width: auto;
                max-height: 300px;
            }

            .analysis-section.collapsed {
                max-height: 0;
            }
        }

        /* 滚动条样式 */
        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--gray-300);
            border-radius: 2px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--gray-400);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 左侧导航栏 -->
        <nav class="sidebar">
            <div class="sidebar-avatar">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                </svg>
            </div>

            <a href="index.html" class="nav-back" title="返回首页">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
                </svg>
            </a>

            <div class="nav-divider"></div>

            <div class="quick-nav">
                <div class="quick-nav-item" onclick="restartInterview()">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
                    </svg>
                    <span class="tooltip">重新开始</span>
                </div>

                <div class="quick-nav-item" onclick="changeJob()">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M20 6h-4V4c0-1.11-.89-2-2-2h-4c-1.11 0-2 .89-2 2v2H4c-1.11 0-1.99.89-1.99 2L2 19c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2zm-6 0h-4V4h4v2z"/>
                    </svg>
                    <span class="tooltip">更换岗位</span>
                </div>

                <div class="quick-nav-item" onclick="toggleAnalysis()">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/>
                    </svg>
                    <span class="tooltip">分析面板</span>
                </div>

                <div class="quick-nav-item" onclick="showHistory()">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/>
                    </svg>
                    <span class="tooltip">面试记录</span>
                </div>

                <div class="quick-nav-item" onclick="showHelp()">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17h-2v-2h2v2zm2.07-7.75l-.9.92C13.45 12.9 13 13.5 13 15h-2v-.5c0-1.1.45-2.1 1.17-2.83l1.24-1.26c.37-.36.59-.86.59-1.41 0-1.1-.9-2-2-2s-2 .9-2 2H8c0-2.21 1.79-4 4-4s4 1.79 4 4c0 .88-.36 1.68-.93 2.25z"/>
                    </svg>
                    <span class="tooltip">帮助</span>
                </div>
            </div>
        </nav>

        <!-- 主内容区 -->
        <main class="main-content">
            <!-- 上半部分 - 岗位信息 -->
            <section class="job-header">
                <div class="job-info">
                    <div class="job-icon">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M20 6h-4V4c0-1.11-.89-2-2-2h-4c-1.11 0-2 .89-2 2v2H4c-1.11 0-1.99.89-1.99 2L2 19c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2zm-6 0h-4V4h4v2z"/>
                        </svg>
                    </div>
                    <div class="job-details">
                        <div class="job-title">高级前端开发工程师</div>
                        <div class="job-company">字节跳动 · 技术面</div>
                    </div>
                </div>
                <div class="job-actions">
                    <button class="btn btn-secondary" onclick="changeJob()">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
                        </svg>
                        更换岗位
                    </button>
                    <button class="btn btn-primary" onclick="startInterview()">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M8 5v14l11-7z"/>
                        </svg>
                        开始面试
                    </button>
                </div>
            </section>

            <!-- 下半部分 - 主要内容区 -->
            <section class="content-section">
                <!-- 左侧问答区域 -->
                <div class="qa-section">
                    <div class="qa-header">
                        <div class="qa-title">
                            <div class="qa-title-icon">
                                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                    <path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM6 9h12v2H6V9zm8 5H6v-2h8v2zm4-6H6V6h12v2z"/>
                                </svg>
                            </div>
                            面试问答
                        </div>
                        <div class="qa-progress">
                            <div class="progress-bar">
                                <div class="progress-fill" id="progressFill" style="width: 20%"></div>
                            </div>
                            <span id="progressText">1/5</span>
                        </div>
                    </div>

                    <div class="qa-content" id="qaContent">
                        <!-- 面试消息 -->
                        <div class="interview-message ai">
                            <div class="message-avatar">
                                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                    <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                                </svg>
                            </div>
                            <div class="message-content">
                                <div class="question-number">问题 1/5</div>
                                <p>您好！欢迎参加本次面试。我是您的AI面试官。</p>
                                <p>首先，请您简单介绍一下自己，包括您的工作经验和技术栈。</p>
                            </div>
                        </div>
                    </div>

                    <div class="qa-input">
                        <div class="input-wrapper">
                            <textarea id="answerInput" placeholder="输入您的回答..." rows="1" onkeydown="handleKeyDown(event)"></textarea>
                            <div class="input-actions">
                                <button class="input-action-btn" title="语音输入" onclick="voiceInput()">
                                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                        <path d="M12 14c1.66 0 2.99-1.34 2.99-3L15 5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/>
                                    </svg>
                                </button>
                                <button class="input-action-btn" title="提示" onclick="showHint()">
                                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                        <path d="M9 21c0 .55.45 1 1 1h4c.55 0 1-.45 1-1v-1H9v1zm3-19C8.14 2 5 5.14 5 9c0 2.38 1.19 4.47 3 5.74V17c0 .55.45 1 1 1h6c.55 0 1-.45 1-1v-2.26c1.81-1.27 3-3.36 3-5.74 0-3.86-3.14-7-7-7zm2.85 11.1l-.85.6V16h-4v-2.3l-.85-.6C7.8 12.16 7 10.63 7 9c0-2.76 2.24-5 5-5s5 2.24 5 5c0 1.63-.8 3.16-2.15 4.1z"/>
                                    </svg>
                                </button>
                            </div>
                        </div>
                        <button class="send-btn" title="提交回答" onclick="submitAnswer()">
                            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- 右侧AI分析区域 -->
                <section class="analysis-section" id="analysisSection">
                    <div class="analysis-header">
                        <div class="analysis-title">
                            <div class="analysis-title-icon">
                                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                    <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/>
                                </svg>
                            </div>
                            AI分析
                        </div>
                        <button class="toggle-btn" onclick="toggleAnalysis()">
                            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6 1.41-1.41z"/>
                            </svg>
                        </button>
                    </div>

                    <div class="analysis-content">
                        <!-- 评分展示 -->
                        <div class="score-section">
                            <div class="score-header">综合评分</div>
                            <div class="score-grid">
                                <div class="score-item">
                                    <div class="score-value">--</div>
                                    <div class="score-label">表达能力</div>
                                </div>
                                <div class="score-item">
                                    <div class="score-value">--</div>
                                    <div class="score-label">技术深度</div>
                                </div>
                                <div class="score-item">
                                    <div class="score-value">--</div>
                                    <div class="score-label">逻辑思维</div>
                                </div>
                                <div class="score-item">
                                    <div class="score-value">--</div>
                                    <div class="score-label">问题解决</div>
                                </div>
                            </div>
                        </div>

                        <!-- 参考答案 -->
                        <div class="answer-card">
                            <div class="answer-header">
                                <span class="answer-label">参考答案</span>
                                <span class="answer-score high">优秀</span>
                            </div>
                            <div class="answer-content">
                                <p>等待您回答后，AI将提供参考答案和分析...</p>
                            </div>
                        </div>

                        <!-- AI分析 -->
                        <div class="analysis-card">
                            <div class="analysis-card-header">
                                <div class="analysis-card-icon">
                                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                                    </svg>
                                </div>
                                <span class="analysis-card-title">回答分析</span>
                            </div>
                            <div class="analysis-item">
                                <div class="analysis-item-icon neutral">
                                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
                                    </svg>
                                </div>
                                <span class="analysis-item-text">等待您的回答后，AI将提供详细分析...</span>
                            </div>
                        </div>
                    </div>
                </section>
            </section>
        </main>
    </div>

    <script>
        // 面试状态
        let currentQuestion = 1;
        let totalQuestions = 5;
        let isAnalyzing = false;

        // 提交回答
        function submitAnswer() {
            const input = document.getElementById('answerInput');
            const answer = input.value.trim();
            if (!answer || isAnalyzing) return;

            // 添加用户回答
            addMessage(answer, 'user');
            input.value = '';
            input.style.height = 'auto';

            isAnalyzing = true;

            // 模拟AI分析
            setTimeout(() => {
                // 更新进度
                currentQuestion++;
                updateProgress();

                // 生成下一个问题
                const nextQuestion = generateNextQuestion(answer);
                addMessage(nextQuestion, 'ai');

                // 更新分析面板
                updateAnalysis(answer);

                isAnalyzing = false;
            }, 1500);
        }

        // 添加消息
        function addMessage(content, type) {
            const qaContent = document.getElementById('qaContent');
            const messageDiv = document.createElement('div');
            messageDiv.className = `interview-message ${type}`;

            const avatarSvg = type === 'ai'
                ? '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>'
                : '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>';

            const questionNumber = type === 'ai' ? `<div class="question-number">问题 ${currentQuestion}/${totalQuestions}</div>` : '';

            messageDiv.innerHTML = `
                <div class="message-avatar">${avatarSvg}</div>
                <div class="message-content">
                    ${questionNumber}
                    <p>${content}</p>
                </div>
            `;

            qaContent.appendChild(messageDiv);
            qaContent.scrollTop = qaContent.scrollHeight;
        }

        // 生成下一个问题
        function generateNextQuestion(answer) {
            const questions = [
                '很好！请介绍一下您在项目中遇到的最大技术挑战，以及您是如何解决的？',
                '了解。请谈谈您对前端性能优化的理解和实践经验。',
                '不错。请描述一下您是如何进行代码审查和保证代码质量的？',
                '很好！最后一个问题：您对未来3年的职业规划是什么？',
                '感谢您的回答！面试结束。我会为您生成详细的面试报告。'
            ];

            if (currentQuestion > totalQuestions) {
                return '面试结束！感谢您的参与。AI正在为您生成面试报告...';
            }

            return questions[currentQuestion - 2] || questions[0];
        }

        // 更新进度
        function updateProgress() {
            const progressFill = document.getElementById('progressFill');
            const progressText = document.getElementById('progressText');

            const progress = Math.min((currentQuestion / totalQuestions) * 100, 100);
            progressFill.style.width = progress + '%';
            progressText.textContent = `${Math.min(currentQuestion, totalQuestions)}/${totalQuestions}`;
        }

        // 更新分析面板
        function updateAnalysis(answer) {
            // 模拟评分
            const scores = {
                expression: Math.floor(Math.random() * 30) + 70,
                technical: Math.floor(Math.random() * 30) + 70,
                logic: Math.floor(Math.random() * 30) + 70,
                problemSolving: Math.floor(Math.random() * 30) + 70
            };

            // 更新评分
            const scoreValues = document.querySelectorAll('.score-value');
            scoreValues[0].textContent = scores.expression;
            scoreValues[1].textContent = scores.technical;
            scoreValues[2].textContent = scores.logic;
            scoreValues[3].textContent = scores.problemSolving;

            // 更新参考答案
            const answerContent = document.querySelector('.answer-content');
            answerContent.innerHTML = `
                <p><strong>您的回答要点：</strong></p>
                <p>${answer.substring(0, 100)}...</p>
                <p style="margin-top: 12px;"><strong>建议改进：</strong></p>
                <p>可以更详细地描述具体的技术细节和解决方案。</p>
            `;

            // 更新分析
            const analysisItems = document.querySelectorAll('.analysis-item');
            analysisItems[0].innerHTML = `
                <div class="analysis-item-icon positive">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
                    </svg>
                </div>
                <span class="analysis-item-text">回答结构清晰，逻辑性强。建议增加具体案例说明。</span>
            `;
        }

        // 处理键盘事件
        function handleKeyDown(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                submitAnswer();
            }

            const textarea = event.target;
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 120) + 'px';
        }

        // 切换分析面板
        function toggleAnalysis() {
            const analysisSection = document.getElementById('analysisSection');
            analysisSection.classList.toggle('collapsed');
        }

        // 开始面试
        function startInterview() {
            alert('面试即将开始...\n\n请准备好回答问题。');
        }

        // 重新开始
        function restartInterview() {
            if (confirm('确定要重新开始面试吗？当前进度将丢失。')) {
                currentQuestion = 1;
                updateProgress();
                const qaContent = document.getElementById('qaContent');
                qaContent.innerHTML = `
                    <div class="interview-message ai">
                        <div class="message-avatar">
                            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                            </svg>
                        </div>
                        <div class="message-content">
                            <div class="question-number">问题 1/5</div>
                            <p>您好！欢迎参加本次面试。我是您的AI面试官。</p>
                            <p>首先，请您简单介绍一下自己，包括您的工作经验和技术栈。</p>
                        </div>
                    </div>
                `;

                // 重置评分
                document.querySelectorAll('.score-value').forEach(el => {
                    el.textContent = '--';
                });
            }
        }

        // 更换岗位
        function changeJob() {
            alert('选择面试岗位...\n\n功能开发中，敬请期待！');
        }

        // 语音输入
        function voiceInput() {
            alert('语音输入功能开发中...');
        }

        // 显示提示
        function showHint() {
            alert('提示：\n\n• 结合具体项目经验回答\n• 突出个人贡献和技术细节\n• 保持逻辑清晰，条理分明');
        }

        // 显示历史
        function showHistory() {
            alert('面试记录...\n\n功能开发中，敬请期待！');
        }

        // 显示帮助
        function showHelp() {
            alert('AI面试官使用指南：\n\n1. 选择面试岗位\n2. 回答AI提出的问题\n3. 查看右侧AI分析和建议\n4. 完成后查看面试报告\n\n祝您面试顺利！');
        }

        // 自动调整输入框高度
        document.getElementById('answerInput').addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });
    </script>
</body>
</html>
