<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI岗位寻找助手</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --white: #ffffff;
            --black: #000000;
            --gray-50: #fafafa;
            --gray-100: #f5f5f5;
            --gray-200: #e5e5e5;
            --gray-300: #d4d4d4;
            --gray-400: #a3a3a3;
            --gray-500: #737373;
            --gray-600: #525252;
            --gray-700: #404040;
            --gray-800: #262626;
            --gray-900: #171717;
            --primary: #2563eb;
            --primary-light: #eff6ff;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--white);
            min-height: 100vh;
            color: var(--gray-900);
            line-height: 1.6;
        }

        .container {
            display: flex;
            min-height: 100vh;
        }

        /* 左侧导航栏 */
        .sidebar {
            width: 72px;
            min-width: 72px;
            background: var(--white);
            border-right: 1px solid var(--gray-200);
            padding: 24px 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 100;
        }

        .sidebar-avatar {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: var(--gray-900);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 28px;
        }

        .sidebar-avatar svg {
            width: 22px;
            height: 22px;
            fill: var(--white);
        }

        .nav-back {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: var(--gray-100);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
        }

        .nav-back:hover {
            background: var(--gray-200);
        }

        .nav-back svg {
            width: 18px;
            height: 18px;
            fill: var(--gray-600);
        }

        .nav-divider {
            width: 24px;
            height: 1px;
            background: var(--gray-200);
            margin-bottom: 24px;
        }

        .quick-nav {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
        }

        .quick-nav-item {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: var(--gray-100);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }

        .quick-nav-item:hover {
            background: var(--gray-200);
        }

        .quick-nav-item svg {
            width: 18px;
            height: 18px;
            fill: var(--gray-500);
        }

        .quick-nav-item .tooltip {
            position: absolute;
            left: 52px;
            background: var(--gray-900);
            color: var(--white);
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 11px;
            white-space: nowrap;
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s ease;
            z-index: 1000;
        }

        .quick-nav-item:hover .tooltip {
            opacity: 1;
            visibility: visible;
        }

        /* 主内容区 */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 32px;
            gap: 32px;
            overflow-y: auto;
        }

        /* 上半部分 */
        .top-section {
            display: flex;
            gap: 24px;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .resume-card {
            flex: 1;
            background: var(--gray-50);
            border: 1px solid var(--gray-200);
            border-radius: 14px;
            padding: 24px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .resume-card:hover {
            border-color: var(--gray-400);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 18px;
        }

        .card-icon {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background: var(--gray-900);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-icon svg {
            width: 18px;
            height: 18px;
            fill: var(--white);
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--gray-900);
        }

        .card-subtitle {
            font-size: 12px;
            color: var(--gray-400);
        }

        .resume-info {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .resume-name {
            font-size: 22px;
            font-weight: 700;
            color: var(--gray-900);
            letter-spacing: -0.02em;
        }

        .resume-title {
            font-size: 14px;
            color: var(--gray-500);
        }

        .resume-skills {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 8px;
        }

        .skill-tag {
            padding: 4px 10px;
            background: var(--gray-100);
            border-radius: 6px;
            font-size: 11px;
            color: var(--gray-600);
            font-weight: 500;
        }

        /* 筛选表单卡片 */
        .filter-card {
            flex: 1;
            background: var(--gray-50);
            border: 1px solid var(--gray-200);
            border-radius: 14px;
            padding: 24px;
        }

        .filter-form {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .filter-label {
            font-size: 12px;
            font-weight: 500;
            color: var(--gray-500);
        }

        .filter-select,
        .filter-input {
            padding: 10px 12px;
            border: 1px solid var(--gray-200);
            border-radius: 8px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            background: var(--white);
            color: var(--gray-900);
            transition: all 0.2s ease;
        }

        .filter-select:focus,
        .filter-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-light);
        }

        .filter-select {
            cursor: pointer;
        }

        .search-btn {
            grid-column: 1 / -1;
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            background: var(--gray-900);
            color: var(--white);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .search-btn:hover {
            background: var(--gray-800);
            transform: translateY(-1px);
        }

        .search-btn:disabled {
            background: var(--gray-400);
            cursor: not-allowed;
            transform: none;
        }

        .search-btn svg {
            width: 18px;
            height: 18px;
            fill: var(--white);
        }

        /* 下半部分 */
        .bottom-section {
            flex: 1;
            animation: fadeIn 0.4s ease 0.1s both;
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 20px;
            font-weight: 600;
            color: var(--gray-900);
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: -0.01em;
        }

        .section-title-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: var(--gray-100);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .section-title-icon svg {
            width: 16px;
            height: 16px;
            fill: var(--gray-600);
        }

        .section-actions {
            display: flex;
            gap: 6px;
        }

        .filter-btn {
            padding: 8px 14px;
            border: 1px solid var(--gray-200);
            border-radius: 8px;
            background: var(--white);
            color: var(--gray-500);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
        }

        .filter-btn:hover {
            border-color: var(--gray-400);
            color: var(--gray-700);
        }

        .filter-btn.active {
            border-color: var(--gray-900);
            color: var(--gray-900);
            background: var(--gray-50);
        }

        /* 汇总信息 */
        .summary-card {
            background: var(--primary-light);
            border: 1px solid #bfdbfe;
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 16px;
            font-size: 14px;
            color: var(--gray-700);
            line-height: 1.6;
        }

        /* 岗位列表 */
        .jobs-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .job-card {
            background: var(--white);
            border: 1px solid var(--gray-200);
            border-radius: 14px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .job-card:hover {
            border-color: var(--gray-400);
            transform: translateY(-1px);
        }

        .job-match {
            width: 64px;
            height: 64px;
            border-radius: 12px;
            background: var(--gray-50);
            border: 1px solid var(--gray-200);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .match-score {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .match-label {
            font-size: 10px;
            color: var(--gray-400);
            margin-top: 2px;
        }

        .job-match.high .match-score {
            color: #22c55e;
        }

        .job-match.medium .match-score {
            color: #eab308;
        }

        .job-match.low .match-score {
            color: #ef4444;
        }

        .job-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .job-header {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .job-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--gray-900);
        }

        .job-company {
            font-size: 13px;
            color: var(--gray-500);
        }

        .job-reason {
            font-size: 12px;
            color: var(--primary);
            font-weight: 500;
        }

        .job-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .job-tag {
            padding: 3px 8px;
            background: var(--gray-100);
            border-radius: 4px;
            font-size: 11px;
            color: var(--gray-500);
        }

        .job-meta {
            display: flex;
            gap: 16px;
            font-size: 12px;
            color: var(--gray-400);
        }

        .job-meta-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .job-meta-item svg {
            width: 14px;
            height: 14px;
            fill: var(--gray-400);
        }

        .job-actions {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .view-btn {
            padding: 10px 18px;
            border: none;
            border-radius: 8px;
            background: var(--gray-900);
            color: var(--white);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
            white-space: nowrap;
        }

        .view-btn:hover {
            background: var(--gray-800);
        }

        .save-btn {
            padding: 8px 16px;
            border: 1px solid var(--gray-200);
            border-radius: 8px;
            background: var(--white);
            color: var(--gray-500);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
        }

        .save-btn:hover {
            border-color: var(--gray-400);
            color: var(--gray-700);
        }

        .save-btn.saved {
            border-color: var(--primary);
            color: var(--primary);
            background: var(--primary-light);
        }

        /* 空状态 */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            color: var(--gray-400);
        }

        .empty-state svg {
            width: 48px;
            height: 48px;
            fill: var(--gray-300);
            margin-bottom: 16px;
        }

        .empty-state-text {
            font-size: 16px;
            font-weight: 500;
        }

        .empty-state-hint {
            font-size: 13px;
            margin-top: 8px;
        }

        /* 加载状态 */
        .loading-spinner {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            gap: 16px;
        }

        .loading-spinner.active {
            display: flex;
        }

        /* 书籍翻页等待动画 */
        .book-loading {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 0;
        }
        .book-loading .book {
            width: 32px;
            height: 24px;
            position: relative;
            perspective: 100px;
        }
        .book-loading .book-page {
            position: absolute;
            width: 16px;
            height: 24px;
            background: var(--gray-400);
            border-radius: 0 2px 2px 0;
            transform-origin: left center;
            animation: flipPage 1.4s ease-in-out infinite;
        }
        .book-loading .book-page:nth-child(1) { animation-delay: 0s; background: var(--gray-300); }
        .book-loading .book-page:nth-child(2) { animation-delay: 0.2s; background: var(--gray-400); }
        .book-loading .book-page:nth-child(3) { animation-delay: 0.4s; background: var(--gray-500); }
        @keyframes flipPage {
            0%, 100% { transform: rotateY(0deg); }
            50% { transform: rotateY(-180deg); }
        }
        .book-loading .loading-text {
            font-size: 14px;
            color: var(--gray-500);
        }
        .book-loading .loading-dots {
            display: inline-flex;
            gap: 3px;
        }
        .book-loading .loading-dots span {
            width: 5px;
            height: 5px;
            background: var(--gray-400);
            border-radius: 50%;
            animation: dotPulse 1.4s ease-in-out infinite;
        }
        .book-loading .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .book-loading .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dotPulse {
            0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
            40% { opacity: 1; transform: scale(1); }
        }

        /* 响应式设计 */
        @media (max-width: 1200px) {
            .top-section {
                flex-direction: column;
            }

            .job-card {
                flex-direction: column;
                align-items: flex-start;
            }

            .job-actions {
                flex-direction: row;
                width: 100%;
            }

            .view-btn, .save-btn {
                flex: 1;
            }
        }

        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                bottom: 0;
                width: 64px;
                z-index: 1000;
            }

            .main-content {
                margin-left: 64px;
                padding: 16px;
            }

            .filter-form {
                grid-template-columns: 1fr;
            }

            .job-meta {
                flex-direction: column;
                gap: 4px;
            }
        }

        /* 滚动条样式 */
        ::-webkit-scrollbar {
            width: 0;
            height: 0;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: transparent;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 左侧导航栏 -->
        <nav class="sidebar">
            <div class="sidebar-avatar">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                </svg>
            </div>

            <a href="index.html" class="nav-back" title="返回首页">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
                </svg>
            </a>

            <div class="nav-divider"></div>

            <div class="quick-nav">
                <div class="quick-nav-item" onclick="scrollToTop()">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M7.41 15.41L12 10.83l4.59 4.58L18 14l-6-6-6 6z"/>
                    </svg>
                    <span class="tooltip">回到顶部</span>
                </div>

                <div class="quick-nav-item" onclick="searchJobs()">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                    </svg>
                    <span class="tooltip">搜索岗位</span>
                </div>

                <div class="quick-nav-item" onclick="showSaved()">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M17 3H7c-1.1 0-1.99.9-1.99 2L5 21l7-3 7 3V5c0-1.1-.9-2-2-2z"/>
                    </svg>
                    <span class="tooltip">已收藏</span>
                </div>

                <div class="quick-nav-item" onclick="showHelp()">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17h-2v-2h2v2zm2.07-7.75l-.9.92C13.45 12.9 13 13.5 13 15h-2v-.5c0-1.1.45-2.1 1.17-2.83l1.24-1.26c.37-.36.59-.86.59-1.41 0-1.1-.9-2-2-2s-2 .9-2 2H8c0-2.21 1.79-4 4-4s4 1.79 4 4c0 .88-.36 1.68-.93 2.25z"/>
                    </svg>
                    <span class="tooltip">帮助</span>
                </div>
            </div>
        </nav>

        <!-- 主内容区 -->
        <main class="main-content">
            <!-- 上半部分 -->
            <section class="top-section">
                <div class="resume-card" onclick="window.location.href='ai-resume-assistant.html'">
                    <div class="card-header">
                        <div class="card-icon">
                            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/>
                            </svg>
                        </div>
                        <div>
                            <div class="card-title">我的简历</div>
                            <div class="card-subtitle">点击编辑</div>
                        </div>
                    </div>
                    <div class="resume-info">
                        <div class="resume-name" id="resumeName">加载中...</div>
                        <div class="resume-title" id="resumeTitle">请先完善简历</div>
                        <div class="resume-skills" id="resumeSkills"></div>
                    </div>
                </div>

                <div class="filter-card">
                    <div class="card-header">
                        <div class="card-icon">
                            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path d="M10 18h4v-2h-4v2zM3 6v2h18V6H3zm3 7h12v-2H6v2z"/>
                            </svg>
                        </div>
                        <div>
                            <div class="card-title">筛选条件</div>
                            <div class="card-subtitle">设置期望条件</div>
                        </div>
                    </div>
                    <div class="filter-form">
                        <div class="filter-group">
                            <label class="filter-label">工作城市</label>
                            <select class="filter-select" id="filterCity">
                                <option value="">不限</option>
                                <option value="北京">北京</option>
                                <option value="上海">上海</option>
                                <option value="深圳">深圳</option>
                                <option value="杭州">杭州</option>
                                <option value="广州">广州</option>
                                <option value="成都">成都</option>
                                <option value="南京">南京</option>
                            </select>
                        </div>
                        <div class="filter-group">
                            <label class="filter-label">岗位类型</label>
                            <select class="filter-select" id="filterJobType">
                                <option value="">不限</option>
                                <option value="实习">实习</option>
                                <option value="全职">全职</option>
                            </select>
                        </div>
                        <div class="filter-group">
                            <label class="filter-label">经验要求</label>
                            <select class="filter-select" id="filterExperience">
                                <option value="">不限</option>
                                <option value="在校/应届">在校/应届</option>
                                <option value="1-3年">1-3年</option>
                                <option value="3-5年">3-5年</option>
                            </select>
                        </div>
                        <div class="filter-group">
                            <label class="filter-label">关键词</label>
                            <input type="text" class="filter-input" id="filterKeywords" placeholder="如：Python, 前端">
                        </div>
                        <button class="search-btn" onclick="searchJobs()" id="searchBtn">
                            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                            </svg>
                            搜索岗位
                        </button>
                    </div>
                </div>
            </section>

            <!-- 下半部分 -->
            <section class="bottom-section">
                <div class="section-header">
                    <div class="section-title">
                        <div class="section-title-icon">
                            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path d="M20 6h-4V4c0-1.11-.89-2-2-2h-4c-1.11 0-2 .89-2 2v2H4c-1.11 0-1.99.89-1.99 2L2 19c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2zm-6 0h-4V4h4v2z"/>
                            </svg>
                        </div>
                        智能推荐
                    </div>
                    <div class="section-actions">
                        <button class="filter-btn active" onclick="filterDisplay('all')">全部</button>
                        <button class="filter-btn" onclick="filterDisplay('high')">高匹配</button>
                        <button class="filter-btn" onclick="filterDisplay('salary')">薪资最高</button>
                    </div>
                </div>

                <div id="summaryContainer"></div>

                <div id="loadingSpinner" class="loading-spinner">
                    <div class="book-loading">
                        <div class="book">
                            <div class="book-page"></div>
                            <div class="book-page"></div>
                            <div class="book-page"></div>
                        </div>
                        <span class="loading-text">正在搜索并分析岗位匹配度</span>
                        <span class="loading-dots"><span></span><span></span><span></span></span>
                    </div>
                </div>

                <div id="jobsList" class="jobs-list">
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                        </svg>
                        <div class="empty-state-text">设置条件开始搜索</div>
                        <div class="empty-state-hint">填写筛选条件后点击搜索按钮</div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000';
        const token = localStorage.getItem('token');

        // 检查登录状态
        if (!token) {
            window.location.href = 'login.html';
        }

        // 存储岗位数据
        let allJobs = [];
        let savedJobs = JSON.parse(localStorage.getItem('savedJobs') || '[]');

        // 页面加载时获取简历信息
        document.addEventListener('DOMContentLoaded', loadResumeInfo);

        async function loadResumeInfo() {
            try {
                const response = await fetch(`${API_BASE}/resume`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.ok) {
                    const data = await response.json();
                    const basicInfo = data.basic_info || {};
                    const strengths = data.personal_strengths || {};

                    document.getElementById('resumeName').textContent = basicInfo.name || '未填写姓名';
                    document.getElementById('resumeTitle').textContent =
                        `${basicInfo.target_position || '未设置职位'} · ${basicInfo.experience || '0'}年经验`;

                    const skills = strengths.skills || [];
                    const skillsHtml = skills.slice(0, 5).map(s =>
                        `<span class="skill-tag">${s}</span>`
                    ).join('');
                    document.getElementById('resumeSkills').innerHTML = skillsHtml;
                }
            } catch (error) {
                console.error('加载简历失败:', error);
            }
        }

        async function searchJobs() {
            const btn = document.getElementById('searchBtn');
            btn.disabled = true;
            btn.innerHTML = `<div class="book-loading" style="gap:4px;"><div class="book" style="width:16px;height:12px;"><div class="book-page" style="width:8px;height:12px;"></div><div class="book-page" style="width:8px;height:12px;"></div><div class="book-page" style="width:8px;height:12px;"></div></div><span style="font-size:13px;">搜索中</span><span class="loading-dots"><span></span><span></span><span></span></span></div>`;

            document.getElementById('loadingSpinner').classList.add('active');
            document.getElementById('jobsList').innerHTML = '';
            document.getElementById('summaryContainer').innerHTML = '';

            const filters = {};
            const city = document.getElementById('filterCity').value;
            const jobType = document.getElementById('filterJobType').value;
            const experience = document.getElementById('filterExperience').value;
            const keywords = document.getElementById('filterKeywords').value;

            if (city) filters.city = city;
            if (jobType) filters.job_type = jobType;
            if (experience) filters.experience = experience;
            if (keywords) {
                filters.keywords = keywords.split(/[,，\s]+/).filter(k => k.trim());
            }

            try {
                const response = await fetch(`${API_BASE}/agent/job-search`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ filters })
                });

                if (!response.ok) {
                    throw new Error('搜索失败');
                }

                const data = await response.json();
                allJobs = data.jobs || [];

                if (data.summary) {
                    document.getElementById('summaryContainer').innerHTML =
                        `<div class="summary-card">${data.summary}</div>`;
                }

                renderJobs(allJobs);
            } catch (error) {
                console.error('搜索失败:', error);
                document.getElementById('jobsList').innerHTML =
                    '<div class="empty-state"><div class="empty-state-text">搜索失败，请稍后重试</div></div>';
            } finally {
                btn.disabled = false;
                btn.innerHTML = `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg> 搜索岗位`;
                document.getElementById('loadingSpinner').classList.remove('active');
            }
        }

        function renderJobs(jobs) {
            const container = document.getElementById('jobsList');

            if (!jobs || jobs.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                        </svg>
                        <div class="empty-state-text">未找到符合条件的岗位</div>
                        <div class="empty-state-hint">请尝试调整筛选条件</div>
                    </div>
                `;
                return;
            }

            container.innerHTML = jobs.map(job => {
                const score = job.score || 0;
                const matchClass = score >= 80 ? 'high' : score >= 60 ? 'medium' : 'low';
                const isSaved = savedJobs.includes(job.id);
                const salaryText = job.salary_unit === '元/天'
                    ? `${job.salary_min}-${job.salary_max}元/天`
                    : `${job.salary_min}-${job.salary_max}K/月`;

                return `
                    <div class="job-card" data-match="${matchClass}" data-salary="${job.salary_max}">
                        <div class="job-match ${matchClass}">
                            <span class="match-score">${score}</span>
                            <span class="match-label">匹配</span>
                        </div>
                        <div class="job-info">
                            <div class="job-header">
                                <span class="job-title">${job.title}</span>
                                <span class="job-company">${job.company}</span>
                            </div>
                            ${job.reason ? `<div class="job-reason">${job.reason}</div>` : ''}
                            <div class="job-tags">
                                ${job.tags.map(t => `<span class="job-tag">${t}</span>`).join('')}
                            </div>
                            <div class="job-meta">
                                <span class="job-meta-item">
                                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                        <path d="M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85 1.78 0 2.44.85 2.5 2.1h2.21c-.07-1.72-1.12-3.3-3.21-3.81V3h-3v2.16c-1.94.42-3.5 1.68-3.5 3.61 0 2.31 1.91 3.46 4.7 4.13 2.5.6 3 1.48 3 2.41 0 .69-.49 1.79-2.7 1.79-2.06 0-2.87-.92-2.98-2.1h-2.2c.12 2.19 1.76 3.42 3.68 3.83V21h3v-2.15c1.95-.37 3.5-1.5 3.5-3.55 0-2.84-2.43-3.81-4.7-4.4z"/>
                                    </svg>
                                    ${salaryText}
                                </span>
                                <span class="job-meta-item">
                                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
                                    </svg>
                                    ${job.city}${job.district ? ' · ' + job.district : ''}
                                </span>
                                <span class="job-meta-item">${job.experience}</span>
                                <span class="job-meta-item">${job.source}</span>
                            </div>
                        </div>
                        <div class="job-actions">
                            <button class="view-btn" onclick="viewJob('${job.url}')">查看详情</button>
                            <button class="save-btn ${isSaved ? 'saved' : ''}" onclick="toggleSave(${job.id}, this)">
                                ${isSaved ? '已收藏' : '收藏'}
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function filterDisplay(type) {
            document.querySelectorAll('.section-actions .filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            let filtered = [...allJobs];

            if (type === 'high') {
                filtered = filtered.filter(j => j.score >= 80);
            } else if (type === 'salary') {
                filtered.sort((a, b) => b.salary_max - a.salary_max);
            }

            renderJobs(filtered);
        }

        function viewJob(url) {
            if (url && url !== '#') {
                window.open(url, '_blank');
            } else {
                alert('查看详情功能开发中...');
            }
        }

        function toggleSave(jobId, btn) {
            const index = savedJobs.indexOf(jobId);
            if (index > -1) {
                savedJobs.splice(index, 1);
                btn.classList.remove('saved');
                btn.textContent = '收藏';
            } else {
                savedJobs.push(jobId);
                btn.classList.add('saved');
                btn.textContent = '已收藏';
            }
            localStorage.setItem('savedJobs', JSON.stringify(savedJobs));
        }

        function showSaved() {
            if (savedJobs.length === 0) {
                alert('暂无收藏的岗位');
                return;
            }

            const saved = allJobs.filter(j => savedJobs.includes(j.id));
            if (saved.length === 0) {
                alert('当前搜索结果中没有已收藏的岗位');
            } else {
                renderJobs(saved);
            }
        }

        function showHelp() {
            alert('使用指南：\n\n1. 设置筛选条件（城市、类型、经验、关键词）\n2. 点击"搜索岗位"按钮\n3. 查看匹配分数和推荐理由\n4. 点击"查看详情"跳转原链接\n5. 收藏感兴趣的岗位');
        }

        function scrollToTop() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
