<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI简历助手</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --white: #ffffff; --black: #000000;
            --gray-50: #fafafa; --gray-100: #f5f5f5; --gray-200: #e5e5e5;
            --gray-300: #d4d4d4; --gray-400: #a3a3a3; --gray-500: #737373;
            --gray-600: #525252; --gray-700: #404040; --gray-800: #262626;
            --gray-900: #171717;
        }

        html, body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--white); color: var(--gray-900); line-height: 1.6;
            height: 100%; overflow: hidden;
        }

        .container { display: flex; height: 100vh; overflow: hidden; }

        /* ===== 左侧导航栏 ===== */
        .sidebar {
            width: 72px; min-width: 72px; background: var(--white);
            border-right: 1px solid var(--gray-200); padding: 24px 12px;
            display: flex; flex-direction: column; align-items: center; z-index: 100;
        }

        .sidebar-avatar {
            width: 40px; height: 40px; border-radius: 10px; background: var(--gray-900);
            display: flex; align-items: center; justify-content: center; margin-bottom: 28px;
        }
        .sidebar-avatar svg { width: 22px; height: 22px; fill: var(--white); }

        .nav-back {
            width: 40px; height: 40px; border-radius: 10px; background: var(--gray-100);
            display: flex; align-items: center; justify-content: center; margin-bottom: 24px;
            cursor: pointer; transition: all 0.2s ease; text-decoration: none;
        }
        .nav-back:hover { background: var(--gray-200); }
        .nav-back svg { width: 18px; height: 18px; fill: var(--gray-600); }

        .nav-divider { width: 24px; height: 1px; background: var(--gray-200); margin-bottom: 24px; }

        .sidebar-nav {
            display: flex; flex-direction: column; gap: 8px; flex: 1; width: 100%;
        }

        .sidebar-nav-item {
            width: 40px; height: 40px; border-radius: 10px; background: var(--gray-100);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s ease; text-decoration: none;
            position: relative; margin: 0 auto;
        }
        .sidebar-nav-item:hover { background: var(--gray-200); }
        .sidebar-nav-item.active { background: var(--gray-900); }
        .sidebar-nav-item.active svg { fill: var(--white); }
        .sidebar-nav-item svg { width: 18px; height: 18px; fill: var(--gray-500); }
        .sidebar-nav-item .tooltip {
            position: absolute; left: 52px; background: var(--gray-900); color: var(--white);
            padding: 6px 10px; border-radius: 6px; font-size: 11px; white-space: nowrap;
            opacity: 0; visibility: hidden; transition: all 0.2s ease; z-index: 1000;
        }
        .sidebar-nav-item:hover .tooltip { opacity: 1; visibility: visible; }

        /* ===== 主内容区 ===== */
        .main-content {
            flex: 1; display: flex; padding: 24px; gap: 24px; overflow: hidden;
            min-height: 0;
        }

        /* ===== 聊天区域 ===== */
        .chat-section {
            width: 60%; background: var(--gray-50); border-radius: 16px;
            display: flex; flex-direction: column; border: 1px solid var(--gray-200);
            min-height: 0; overflow: hidden;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        .chat-header {
            padding: 16px 24px; border-bottom: 1px solid var(--gray-200);
            display: flex; align-items: center; gap: 12px;
            background: var(--white); border-radius: 16px 16px 0 0; flex-shrink: 0;
        }

        .chat-header-left { display: flex; align-items: center; gap: 12px; flex: 1; }

        .chat-header-icon {
            width: 36px; height: 36px; border-radius: 8px; background: var(--gray-900);
            display: flex; align-items: center; justify-content: center;
        }
        .chat-header-icon svg { width: 18px; height: 18px; fill: var(--white); }

        .chat-header-info h2 { font-size: 16px; font-weight: 600; color: var(--gray-900); }
        .chat-header-info p { font-size: 12px; color: var(--gray-400); }

        .help-btn {
            width: 32px; height: 32px; border-radius: 8px; border: none;
            background: var(--gray-100); cursor: pointer; display: flex;
            align-items: center; justify-content: center; transition: all 0.2s ease; flex-shrink: 0;
        }
        .help-btn:hover { background: var(--gray-200); }
        .help-btn svg { width: 16px; height: 16px; fill: var(--gray-500); }

        .chat-messages {
            flex: 1; padding: 24px; overflow-y: auto;
            display: flex; flex-direction: column; gap: 16px; min-height: 0;
        }

        .message { display: flex; gap: 10px; max-width: 80%; animation: fadeIn 0.3s ease; }
        .message.ai { align-self: flex-start; }
        .message.user { align-self: flex-end; flex-direction: row-reverse; }

        .message-avatar {
            width: 32px; height: 32px; border-radius: 8px;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .message.ai .message-avatar { background: var(--gray-900); }
        .message.user .message-avatar { background: var(--gray-300); }
        .message-avatar svg { width: 16px; height: 16px; fill: var(--white); }

        .message-body {
            flex: 1;
            min-width: 0;
        }
        .message-content { padding: 14px 18px; border-radius: 12px; font-size: 14px; line-height: 1.6; }
        .message.ai .message-content { background: var(--white); border: 1px solid var(--gray-200); color: var(--gray-700); }
        .message.user .message-content { background: var(--gray-900); color: var(--white); }

        /* 书籍翻页等待动画 */
        .book-loading {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 8px 0;
        }
        .book-loading .book {
            width: 24px;
            height: 18px;
            position: relative;
            perspective: 100px;
        }
        .book-loading .book-page {
            position: absolute;
            width: 12px;
            height: 18px;
            background: var(--gray-400);
            border-radius: 0 2px 2px 0;
            transform-origin: left center;
            animation: flipPage 1.4s ease-in-out infinite;
        }
        .book-loading .book-page:nth-child(1) { animation-delay: 0s; background: var(--gray-300); }
        .book-loading .book-page:nth-child(2) { animation-delay: 0.2s; background: var(--gray-400); }
        .book-loading .book-page:nth-child(3) { animation-delay: 0.4s; background: var(--gray-500); }
        @keyframes flipPage {
            0%, 100% { transform: rotateY(0deg); }
            50% { transform: rotateY(-180deg); }
        }
        .book-loading .loading-text {
            font-size: 13px;
            color: var(--gray-500);
            margin-left: 4px;
        }
        .book-loading .loading-dots {
            display: inline-flex;
            gap: 2px;
        }
        .book-loading .loading-dots span {
            width: 4px;
            height: 4px;
            background: var(--gray-400);
            border-radius: 50%;
            animation: dotPulse 1.4s ease-in-out infinite;
        }
        .book-loading .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .book-loading .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dotPulse {
            0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
            40% { opacity: 1; transform: scale(1); }
        }
        .message-content p { margin-bottom: 8px; }
        .message-content p:last-child { margin-bottom: 0; }
        .message-content ul { margin: 8px 0; padding-left: 16px; }
        .message-content li { margin-bottom: 4px; }
        .message-content strong { font-weight: 600; }
        .message.user .message-content strong { color: var(--white); }

        /* Thinking 样式 - 独立思考过程框 */
        .message-thinking {
            background: linear-gradient(135deg, #f8f9fa 0%, #f1f3f5 100%);
            border: 1px solid var(--gray-200);
            border-left: 3px solid var(--gray-400);
            border-radius: 0 8px 8px 0;
            padding: 10px 14px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .message-thinking:hover {
            background: linear-gradient(135deg, #f1f3f5 0%, #e9ecef 100%);
            border-left-color: var(--gray-600);
        }
        .thinking-header {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--gray-500);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .thinking-header svg { fill: var(--gray-400); }
        .thinking-content {
            font-size: 12px;
            color: var(--gray-600);
            line-height: 1.6;
            margin-top: 8px;
            max-height: 200px;
            overflow: hidden;
            transition: max-height 0.3s ease;
            white-space: pre-wrap;
            font-family: 'SF Mono', 'Monaco', 'Inconsolata', 'Fira Mono', monospace;
            padding: 8px;
            background: rgba(255,255,255,0.5);
            border-radius: 4px;
        }
        .message-thinking.collapsed .thinking-content {
            max-height: 0;
            margin-top: 0;
            padding: 0;
        }
        .thinking-toggle {
            font-size: 10px;
            color: var(--gray-400);
            margin-left: auto;
        }

        /* 打字光标 */
        .typing-cursor {
            display: inline-block;
            animation: blink 0.8s infinite;
            color: var(--gray-400);
            font-weight: 100;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* ===== 聊天输入区 ===== */
        .chat-input {
            padding: 12px 20px 16px; border-top: 1px solid var(--gray-200);
            display: flex; gap: 10px; align-items: flex-end;
            background: var(--white); border-radius: 0 0 16px 16px; flex-shrink: 0;
        }

        .chat-input-wrapper {
            flex: 1; background: var(--gray-100); border-radius: 12px;
            border: 1px solid transparent; transition: all 0.2s ease; overflow: hidden;
        }
        .chat-input-wrapper:focus-within { border-color: var(--gray-400); background: var(--white); }

        /* 上传状态样式 */
        .upload-status {
            padding: 8px 16px;
            background: var(--gray-50);
            border: 1px solid var(--gray-200);
            border-radius: 10px;
            margin: 0 16px 8px;
            flex-shrink: 0;
        }
        .upload-status-content {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--gray-700);
        }
        .upload-status-content svg {
            fill: var(--gray-500);
            flex-shrink: 0;
        }
        #uploadFileName {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .upload-remove-btn {
            width: 24px;
            height: 24px;
            border-radius: 6px;
            border: none;
            background: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }
        .upload-remove-btn:hover {
            background: var(--gray-200);
        }
        .upload-remove-btn svg {
            fill: var(--gray-400);
        }

        .chat-input textarea {
            width: 100%; padding: 14px 16px; border: none; background: transparent;
            resize: none; font-size: 14px; line-height: 1.5; font-family: 'Inter', sans-serif;
            outline: none; min-height: 44px; max-height: 120px; color: var(--gray-900);
        }
        .chat-input textarea::placeholder { color: var(--gray-400); }

        .chat-input-actions { display: flex; gap: 6px; padding: 0 8px 8px; }

        .input-action-btn {
            width: 32px; height: 32px; border-radius: 8px; border: none;
            background: var(--gray-200); cursor: pointer; display: flex;
            align-items: center; justify-content: center; transition: all 0.2s ease;
        }
        .input-action-btn:hover { background: var(--gray-300); }
        .input-action-btn svg { width: 16px; height: 16px; fill: var(--gray-600); }

        .send-btn-col { display: flex; flex-direction: column; align-items: center; gap: 6px; flex-shrink: 0; }

        .clear-chat-btn {
            width: 44px; height: 28px; border-radius: 8px; border: 1px solid var(--gray-200);
            background: var(--white); cursor: pointer; display: flex; align-items: center;
            justify-content: center; transition: all 0.2s ease;
        }
        .clear-chat-btn:hover { border-color: var(--gray-400); background: var(--gray-50); }
        .clear-chat-btn svg { width: 14px; height: 14px; fill: var(--gray-500); }

        .send-btn {
            width: 44px; height: 44px; border-radius: 12px; border: none;
            background: var(--gray-900); cursor: pointer; display: flex;
            align-items: center; justify-content: center; transition: all 0.2s ease;
        }
        .send-btn:hover { background: var(--gray-800); }
        .send-btn svg { width: 18px; height: 18px; fill: var(--white); }

        /* ===== 右侧文档区域 ===== */
        .document-section {
            flex: 1; min-width: 280px; background: var(--gray-50); border-radius: 16px;
            display: flex; flex-direction: column; border: 1px solid var(--gray-200);
            animation: fadeIn 0.4s ease 0.1s both; min-height: 0; overflow: hidden;
        }

        .document-header {
            padding: 16px 20px; border-bottom: 1px solid var(--gray-200);
            display: flex; align-items: center; justify-content: space-between;
            background: var(--white); border-radius: 16px 16px 0 0; flex-shrink: 0;
        }
        .document-header-left { display: flex; align-items: center; gap: 10px; }
        .document-header-icon {
            width: 32px; height: 32px; border-radius: 8px; background: var(--gray-100);
            display: flex; align-items: center; justify-content: center;
        }
        .document-header-icon svg { width: 16px; height: 16px; fill: var(--gray-600); }
        .document-header h3 { font-size: 14px; font-weight: 600; color: var(--gray-900); }

        .document-actions { display: flex; gap: 6px; }
        .doc-action-btn {
            width: 28px; height: 28px; border-radius: 6px; border: none;
            background: var(--gray-100); cursor: pointer; display: flex;
            align-items: center; justify-content: center; transition: all 0.2s ease;
        }
        .doc-action-btn:hover { background: var(--gray-200); }
        .doc-action-btn svg { width: 14px; height: 14px; fill: var(--gray-500); }

        .document-tabs {
            display: flex; padding: 0 16px; border-bottom: 1px solid var(--gray-200);
            background: var(--white); flex-shrink: 0;
        }
        .doc-tab {
            padding: 10px 16px; font-size: 12px; font-weight: 500; color: var(--gray-400);
            cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s ease;
        }
        .doc-tab.active { color: var(--gray-900); border-bottom-color: var(--gray-900); }
        .doc-tab:hover { color: var(--gray-700); }

        .document-content { flex: 1; padding: 20px; overflow-y: auto; min-height: 0; }

        .resume-preview { background: var(--white); border-radius: 12px; padding: 24px; border: 1px solid var(--gray-200); }
        .resume-header { text-align: center; margin-bottom: 24px; padding-bottom: 20px; border-bottom: 1px solid var(--gray-200); }
        .resume-name { font-size: 22px; font-weight: 700; color: var(--gray-900); margin-bottom: 4px; letter-spacing: -0.02em; }
        .resume-title { font-size: 13px; color: var(--gray-500); font-weight: 500; }
        .resume-contact { display: flex; justify-content: center; gap: 16px; margin-top: 12px; font-size: 11px; color: var(--gray-400); }
        .resume-contact span { display: flex; align-items: center; gap: 4px; }

        .resume-section { margin-bottom: 20px; }
        .resume-section-title {
            font-size: 12px; font-weight: 600; color: var(--gray-900);
            margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--gray-200);
            text-transform: uppercase; letter-spacing: 0.05em;
        }
        .resume-item { margin-bottom: 14px; }
        .resume-item-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
        .resume-item-title { font-size: 13px; font-weight: 600; color: var(--gray-900); }
        .resume-item-date { font-size: 11px; color: var(--gray-400); }
        .resume-item-subtitle { font-size: 12px; color: var(--gray-500); margin-bottom: 6px; }
        .resume-item-desc { font-size: 12px; color: var(--gray-500); line-height: 1.6; }
        .resume-item-desc ul { padding-left: 14px; }
        .resume-item-desc li { margin-bottom: 3px; }

        .skills-grid { display: flex; flex-wrap: wrap; gap: 6px; }
        .skill-tag { padding: 4px 10px; background: var(--gray-100); border-radius: 6px; font-size: 11px; color: var(--gray-600); font-weight: 500; }

        .resume-preview[contenteditable="true"] { outline: none; border-color: var(--gray-400); box-shadow: 0 0 0 3px rgba(0,0,0,0.05); }
        .resume-preview[contenteditable="true"]:focus { border-color: var(--gray-500); }
        .resume-preview[contenteditable="true"] [contenteditable="true"]:focus { background: rgba(0,0,0,0.02); border-radius: 4px; outline: 1px dashed var(--gray-300); }

        .edit-hint { font-size: 11px; color: var(--gray-400); text-align: center; padding: 6px 0; display: none; }
        .edit-hint.visible { display: block; }

        .empty-state { text-align: center; padding: 60px 20px; }
        .empty-state svg { width: 64px; height: 64px; fill: var(--gray-300); margin-bottom: 20px; }
        .empty-state p { font-size: 15px; color: var(--gray-500); margin-bottom: 6px; }
        .empty-state .empty-sub { font-size: 13px; color: var(--gray-400); }

        .toast {
            position: fixed; top: 24px; left: 50%; transform: translateX(-50%) translateY(-100px);
            background: var(--gray-900); color: var(--white); padding: 12px 24px;
            border-radius: 10px; font-size: 14px; font-weight: 500;
            transition: transform 0.3s ease; z-index: 1000;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.error { background: #ef4444; }

        .history-panel { display: none; }
        .history-panel.active { display: block; }

        /* 会话管理样式 */
        .session-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 16px; border: 1px solid var(--gray-200); border-radius: 10px;
            margin-bottom: 8px; background: var(--white); cursor: pointer; transition: all 0.2s ease;
        }
        .session-item:hover { border-color: var(--gray-300); background: var(--gray-50); }
        .session-item.active { border-color: var(--gray-900); background: var(--gray-50); }
        .session-item-info { flex: 1; }
        .session-item-title { font-size: 13px; font-weight: 600; color: var(--gray-800); }
        .session-item-meta { font-size: 11px; color: var(--gray-400); margin-top: 3px; display: flex; gap: 10px; }
        .session-item-actions { display: flex; gap: 6px; }
        .session-btn {
            width: 28px; height: 28px; border-radius: 6px; border: none;
            background: var(--gray-100); cursor: pointer; display: flex;
            align-items: center; justify-content: center; transition: all 0.2s ease;
        }
        .session-btn:hover { background: var(--gray-200); }
        .session-btn svg { width: 14px; height: 14px; fill: var(--gray-500); }
        .session-btn.delete:hover { background: #fef2f2; }
        .session-btn.delete svg { fill: #ef4444; }
        .session-empty { text-align: center; padding: 40px 20px; color: var(--gray-400); font-size: 13px; }
        .session-empty svg { width: 40px; height: 40px; fill: var(--gray-300); margin-bottom: 12px; }

        /* 首页大聊天框 */
        .welcome-view {
            flex: 1; display: flex; align-items: center; justify-content: center;
            padding: 40px;
        }
        .welcome-content {
            width: 100%; max-width: 640px; text-align: center;
        }
        .welcome-icon {
            width: 64px; height: 64px; border-radius: 16px; background: var(--gray-900);
            display: flex; align-items: center; justify-content: center; margin: 0 auto 24px;
        }
        .welcome-icon svg { width: 32px; height: 32px; fill: var(--white); }
        .welcome-title {
            font-size: 28px; font-weight: 700; color: var(--gray-900); margin-bottom: 8px; letter-spacing: -0.02em;
        }
        .welcome-desc {
            font-size: 15px; color: var(--gray-500); margin-bottom: 32px;
        }
        .welcome-input-box {
            background: var(--white); border: 1px solid var(--gray-200); border-radius: 16px;
            padding: 16px; text-align: left; box-shadow: 0 4px 24px rgba(0,0,0,0.06);
            transition: border-color 0.2s;
        }
        .welcome-input-box:focus-within { border-color: var(--gray-400); }
        .welcome-input-box textarea {
            width: 100%; border: none; outline: none; resize: none; font-size: 15px;
            font-family: 'Inter', sans-serif; line-height: 1.6; color: var(--gray-900);
            min-height: 72px; background: transparent;
        }
        .welcome-input-box textarea::placeholder { color: var(--gray-400); }
        .welcome-input-actions {
            display: flex; justify-content: space-between; align-items: center; margin-top: 8px;
        }
        .welcome-send-btn {
            width: 36px; height: 36px; border-radius: 10px; border: none;
            background: var(--gray-900); cursor: pointer; display: flex;
            align-items: center; justify-content: center; transition: all 0.2s;
        }
        .welcome-send-btn:hover { background: var(--gray-800); }
        .welcome-send-btn svg { width: 18px; height: 18px; fill: var(--white); }
        .welcome-hints {
            display: flex; justify-content: center; gap: 8px; margin-top: 20px; flex-wrap: wrap;
        }
        .hint-tag {
            padding: 8px 16px; background: var(--white); border: 1px solid var(--gray-200);
            border-radius: 20px; font-size: 13px; color: var(--gray-600); cursor: pointer;
            transition: all 0.2s;
        }
        .hint-tag:hover { border-color: var(--gray-400); color: var(--gray-900); background: var(--gray-50); }

        /* 聊天视图 */
        .chat-view { display: flex; flex-direction: column; flex: 1; min-height: 0; overflow: hidden; }
        .chat-header-actions { display: flex; gap: 8px; align-items: center; }
        .header-action-btn {
            width: 32px; height: 32px; border-radius: 8px; border: none;
            background: var(--gray-100); cursor: pointer; display: flex;
            align-items: center; justify-content: center; transition: all 0.2s;
        }
        .header-action-btn:hover { background: var(--gray-200); }
        .header-action-btn svg { width: 16px; height: 16px; fill: var(--gray-600); }
        .history-empty { text-align: center; padding: 40px 20px; color: var(--gray-400); font-size: 13px; }
        .history-empty svg { width: 40px; height: 40px; fill: var(--gray-300); margin-bottom: 12px; }

        .history-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 14px; border: 1px solid var(--gray-200); border-radius: 10px;
            margin-bottom: 8px; background: var(--white); cursor: pointer; transition: all 0.2s ease;
        }
        .history-item:hover { border-color: var(--gray-300); background: var(--gray-50); }
        .history-item-info { flex: 1; cursor: pointer; }
        .history-item-actions { display: flex; gap: 6px; }
        .history-btn {
            width: 28px; height: 28px; border-radius: 6px; border: none;
            background: var(--gray-100); cursor: pointer; display: flex;
            align-items: center; justify-content: center; transition: all 0.2s ease;
        }
        .history-btn:hover { background: var(--gray-200); }
        .history-btn svg { width: 14px; height: 14px; fill: var(--gray-500); }
        .history-btn[style*="color:#ef4444"]:hover { background: #fef2f2; }
        .history-btn[style*="color:#ef4444"] svg { fill: #ef4444; }
        .history-item-time { font-size: 13px; font-weight: 500; color: var(--gray-800); }
        .history-item-date { font-size: 11px; color: var(--gray-400); margin-top: 2px; }

        .document-footer {
            padding: 12px 16px; border-top: 1px solid var(--gray-200);
            display: flex; justify-content: space-between; align-items: center;
            background: var(--white); border-radius: 0 0 16px 16px; flex-shrink: 0;
        }
        .footer-left { display: flex; align-items: center; gap: 8px; }
        .doc-status { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--gray-400); }
        .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #22c55e; }

        .footer-actions { display: flex; gap: 8px; }

        .doc-export-btn, .doc-save-btn {
            padding: 8px 14px; border: none; border-radius: 8px;
            font-size: 12px; font-weight: 500; cursor: pointer;
            transition: all 0.2s ease; display: flex; align-items: center;
            gap: 6px; font-family: 'Inter', sans-serif;
        }
        .doc-export-btn {
            background: var(--white); color: var(--gray-700); border: 1px solid var(--gray-200);
        }
        .doc-export-btn:hover { border-color: var(--gray-400); color: var(--gray-900); }
        .doc-export-btn svg { width: 12px; height: 12px; fill: var(--gray-600); }

        .doc-save-btn { background: var(--gray-900); color: var(--white); }
        .doc-save-btn:hover { background: var(--gray-800); }
        .doc-save-btn svg { width: 12px; height: 12px; fill: var(--white); }

        /* 滚动条 */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--gray-300); border-radius: 2px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--gray-400); }

        /* 模态框 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        .modal {
            background: var(--white);
            border-radius: 16px;
            width: 480px;
            max-width: 90vw;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            transform: translateY(20px);
            transition: transform 0.3s ease;
        }
        .modal-overlay.active .modal {
            transform: translateY(0);
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px;
            border-bottom: 1px solid var(--gray-200);
        }
        .modal-header h3 {
            font-size: 18px;
            font-weight: 600;
            color: var(--gray-900);
        }
        .modal-close {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            border: none;
            background: var(--gray-100);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: var(--gray-500);
            transition: all 0.2s ease;
        }
        .modal-close:hover {
            background: var(--gray-200);
            color: var(--gray-900);
        }
        .modal-body {
            padding: 24px;
        }
        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            padding: 16px 24px;
            border-top: 1px solid var(--gray-200);
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group:last-child {
            margin-bottom: 0;
        }
        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--gray-700);
            margin-bottom: 8px;
        }
        .format-options {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .format-option {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border: 2px solid var(--gray-200);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .format-option:hover {
            border-color: var(--gray-300);
            background: var(--gray-50);
        }
        .format-option.active {
            border-color: var(--gray-900);
            background: var(--gray-50);
        }
        .format-icon {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: var(--gray-100);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .format-icon svg {
            width: 20px;
            height: 20px;
            fill: var(--gray-600);
        }
        .format-option.active .format-icon {
            background: var(--gray-900);
        }
        .format-option.active .format-icon svg {
            fill: var(--white);
        }
        .format-info {
            flex: 1;
        }
        .format-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--gray-900);
        }
        .format-desc {
            font-size: 12px;
            color: var(--gray-500);
            margin-top: 2px;
        }
        .filename-input-wrapper {
            display: flex;
            align-items: center;
            border: 1px solid var(--gray-300);
            border-radius: 10px;
            overflow: hidden;
            transition: all 0.2s ease;
        }
        .filename-input-wrapper:focus-within {
            border-color: var(--gray-900);
            box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.05);
        }
        .form-input {
            flex: 1;
            padding: 10px 14px;
            border: none;
            outline: none;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            color: var(--gray-900);
        }
        .form-input::placeholder {
            color: var(--gray-400);
        }
        .filename-ext {
            padding: 10px 14px;
            background: var(--gray-100);
            font-size: 14px;
            color: var(--gray-500);
            font-weight: 500;
            border-left: 1px solid var(--gray-300);
        }
        .btn {
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Inter', sans-serif;
        }
        .btn-primary {
            background: var(--gray-900);
            color: var(--white);
            border: none;
        }
        .btn-primary:hover {
            background: var(--gray-800);
        }
        .btn-primary svg {
            width: 16px;
            height: 16px;
            fill: var(--white);
        }
        .btn-secondary {
            background: var(--white);
            color: var(--gray-700);
            border: 1px solid var(--gray-300);
        }
        .btn-secondary:hover {
            background: var(--gray-50);
            border-color: var(--gray-400);
        }
    </style>
</head>
<body>

        <!-- 主内容区 -->
        <main class="main-content">
            <!-- 左侧聊天区域 -->
            <section class="chat-section">
                <!-- 首页视图：大聊天框 -->
                <div class="welcome-view" id="welcomeView">
                    <div class="welcome-content">
                        <div class="welcome-icon">
                            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/>
                            </svg>
                        </div>
                        <h1 class="welcome-title">AI 简历助手</h1>
                        <p class="welcome-desc">告诉我你的经历，我来帮你打造专业简历</p>
                        <div class="welcome-input-box">
                            <textarea id="welcomeInput" placeholder="粘贴 JD、描述你的经历，或直接说"帮我生成简历"..." rows="3" onkeydown="handleWelcomeKeyDown(event)"></textarea>
                            <div class="welcome-input-actions">
                                <button class="input-action-btn" title="上传简历" onclick="uploadResume()">
                                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                        <path d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1h-4V17h4c2.76 0 5-2.24 5-5s-2.24-5-5-5z"/>
                                    </svg>
                                </button>
                                <button class="welcome-send-btn" title="发送" onclick="sendWelcomeMessage()">
                                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                                    </svg>
                                </button>
                            </div>
                        </div>
                        <div class="welcome-hints">
                            <span class="hint-tag" onclick="quickSend('帮我生成简历')">帮我生成简历</span>
                            <span class="hint-tag" onclick="quickSend('分析这个 JD')">分析 JD</span>
                            <span class="hint-tag" onclick="quickSend('优化我的简历')">优化简历</span>
                        </div>

                <!-- 聊天视图 -->

                        <div class="chat-header-left">

                                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                    <path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/>
                                </svg>
                            </div>

                        </div>
                        <div class="chat-header-actions">
                            <button class="header-action-btn" title="新建会话" onclick="newSession()">
                                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                    <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>

                            </button>

            <!-- 右侧文档区域 -->
            <section class="document-section">
                <div class="document-header">
                    <div class="document-header-left">
                        <div class="document-header-icon">
                            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/>
                            </svg>
                        </div>
                        <h3>简历预览</h3>
                    </div>
                    <div class="document-actions">
                        <button class="doc-action-btn" title="放大" onclick="zoom(0.1)">
                            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>

                </div>

                <div class="document-tabs">
                    <div class="doc-tab active" onclick="switchTab('preview')">预览</div>
                    <div class="doc-tab" onclick="switchTab('edit')">编辑</div>
                    <div class="doc-tab" onclick="switchTab('history')">历史</div>
                    <div class="doc-tab" onclick="switchTab('sessions')">会话</div>
                </div>

                <div class="document-content">
                    <div class="preview-panel" id="previewPanel">
                        <div class="edit-hint" id="editHint">✏️ 点击简历内容即可编辑，编辑完成后请保存</div>

                    </div>
                    <div class="history-panel" id="historyPanel">
                        <div id="historyList"></div>
                    </div>
                    <div class="history-panel" id="sessionsPanel">
                        <div id="sessionsList"></div>
                    </div>
                </div>

                <div class="document-footer">
                    <div class="footer-left">
                        <div class="doc-status">
                            <div class="status-dot"></div>
                            <span>自动保存</span>
                        </div>
                    </div>
                    <div class="footer-actions">
                        <button class="doc-export-btn" onclick="exportResume()">
                            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/>
                            </svg>
                            导出
                        </button>
                        <button class="doc-save-btn" onclick="saveResume()">

    <script>
        const API_BASE = 'http://localhost:8000';
        let hasResume = false;
        let uploadedFile = null; // 存储上传的简历文件
        let uploadedFileId = null; // 存储上传后的文件 ID
        let currentResumeData = null; // 存储当前简历数据
        let currentSessionId = null; // 当前会话 ID

        // XSS 防御：转义 HTML 特殊字符
        function escapeHtml(str) {
            if (typeof str !== 'string') return str;
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        async function apiFetch(path, options = {}) {
            const token = localStorage.getItem('token');
            const headers = { 'Content-Type': 'application/json', ...options.headers };
            if (token) headers['Authorization'] = `Bearer ${token}`;
            const res = await fetch(`${API_BASE}${path}`, { ...options, headers });
            if (res.status === 401) {
                localStorage.removeItem('token'); localStorage.removeItem('isLoggedIn');
                window.location.href = 'login.html'; throw new Error('未登录');
            }
            if (res.status === 204) return null;
            const data = await res.json();
            if (!res.ok) throw new Error(data.detail || '请求失败');
            return data;
        }

        function renderResumeHTML(data) {
            const b = data.basic_info || {};
            const edu = data.education || [];
            const intern = data.internship_exp || [];
            const proj = data.project_exp || [];
            const strengths = data.personal_strengths || [];
            let html = `<div class="resume-header"><div class="resume-name">${escapeHtml(b.name) || '姓名'}</div><div class="resume-contact">${b.email ? `<span>${escapeHtml(b.email)}</span>` : ''}${b.phone ? `<span>${escapeHtml(b.phone)}</span>` : ''}</div></div>`;
            if (edu.length) { html += `<div class="resume-section"><div class="resume-section-title">教育经历</div>`; edu.forEach(e => { html += `<div class="resume-item"><div class="resume-item-header"><div class="resume-item-title">${escapeHtml(e.school) || ''} · ${escapeHtml(e.degree) || ''} · ${escapeHtml(e.major) || ''}</div><div class="resume-item-date">${escapeHtml(e.time) || ''}</div></div>${e.courses ? `<div class="resume-item-desc">主修课程：${escapeHtml(e.courses)}</div>` : ''}</div>`; }); html += `</div>`; }
            if (intern.length) { html += `<div class="resume-section"><div class="resume-section-title">实习经历</div>`; intern.forEach(item => { html += `<div class="resume-item"><div class="resume-item-header"><div class="resume-item-title">${escapeHtml(item.role) || ''}</div><div class="resume-item-date">${escapeHtml(item.time) || ''}</div></div><div class="resume-item-subtitle">${escapeHtml(item.company) || ''}</div>${item.description && item.description.length ? `<div class="resume-item-desc"><ul>${item.description.map(d => `<li>${escapeHtml(d)}</li>`).join('')}</ul></div>` : ''}</div>`; }); html += `</div>`; }
            if (proj.length) { html += `<div class="resume-section"><div class="resume-section-title">项目经历</div>`; proj.forEach(item => { html += `<div class="resume-item"><div class="resume-item-header"><div class="resume-item-title">${escapeHtml(item.name) || ''} | ${escapeHtml(item.role) || ''}</div><div class="resume-item-date">${escapeHtml(item.time) || ''}</div></div>${item.description && item.description.length ? `<div class="resume-item-desc"><ul>${item.description.map(d => `<li>${escapeHtml(d)}</li>`).join('')}</ul></div>` : ''}</div>`; }); html += `</div>`; }
            if (strengths.length) { html += `<div class="resume-section"><div class="resume-section-title">个人优势</div><div class="resume-item-desc"><ul>${strengths.map(s => `<li>${escapeHtml(s)}</li>`).join('')}</ul></div></div>`; }
            return html;
        }

        function showEmptyState() {
            hasResume = false;
            document.getElementById('resumePreview').innerHTML = `<div class="empty-state"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg><p>快用AI助手完成你的第一版简历吧</p><p class="empty-sub">在左侧聊天区告诉AI你的经历，即可自动生成简历</p></div>`;
        }

        async function loadResume() {
            try {
                const data = await apiFetch('/resume');
                if (data.has_resume) {
                    hasResume = true;
                    currentResumeData = data;
                    document.getElementById('resumePreview').innerHTML = renderResumeHTML(data);
                } else {
                    currentResumeData = null;
                    showEmptyState();
                }
            } catch (err) {
                currentResumeData = null;
                showEmptyState();
            }
        }

        function saveResume() {
            if (!hasResume) { showToast('请先通过AI助手生成简历', 'error'); return; }
            const resumeData = extractResumeFromPreview();
            if (!resumeData) { showToast('无法提取简历数据', 'error'); return; }
            document.getElementById('saveHistoryName').value = '';
            document.getElementById('saveModal').classList.add('active');
            document.getElementById('saveHistoryName').focus();
        }

        function closeSaveModal() {
            document.getElementById('saveModal').classList.remove('active');
        }

        async function confirmSave() {
            const btn = document.querySelector('#saveModal .btn-primary');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg> 保存中...';
            btn.disabled = true;

            try {
                const resumeData = extractResumeFromPreview();
                const historyName = document.getElementById('saveHistoryName').value.trim();
                const payload = { ...resumeData };
                if (historyName) payload.history_name = historyName;
                const data = await apiFetch('/resume', { method: 'PUT', body: JSON.stringify(payload) });
                currentResumeData = data;
                showToast('保存成功');
                closeSaveModal();
            } catch (err) {
                showToast('保存失败：' + err.message, 'error');
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        // 从预览区提取简历数据
        function extractResumeFromPreview() {
            try {
                const preview = document.getElementById('resumePreview');
                // 编辑模式下从 DOM 提取（捕获用户的手动编辑）
                if (preview && preview.getAttribute('contenteditable') === 'true') {
                    return extractResumeFromDOM();
                }
                // 非编辑模式使用内存缓存
                if (!currentResumeData) return null;
                return {
                    basic_info: currentResumeData.basic_info || { name: '', phone: '', email: '' },
                    education: currentResumeData.education || [],
                    internship_exp: currentResumeData.internship_exp || [],
                    project_exp: currentResumeData.project_exp || [],
                    personal_strengths: currentResumeData.personal_strengths || [],
                };
            } catch (err) {
                console.error('提取简历数据失败:', err);
                return null;
            }
        }

        // 从 DOM 解析简历数据（编辑模式下使用）
        function extractResumeFromDOM() {
            const preview = document.getElementById('resumePreview');
            if (!preview) return null;

            const nameEl = preview.querySelector('.resume-name');
            const contactSpans = preview.querySelectorAll('.resume-contact span');
            const basic_info = {
                name: nameEl ? nameEl.textContent.trim() : '',
                email: contactSpans[0] ? contactSpans[0].textContent.trim() : '',
                phone: contactSpans[1] ? contactSpans[1].textContent.trim() : '',
            };

            const education = [], internship_exp = [], project_exp = [], personal_strengths = [];

            preview.querySelectorAll('.resume-section').forEach(section => {
                const title = section.querySelector('.resume-section-title');
                if (!title) return;
                const titleText = title.textContent.trim();

                if (titleText === '教育经历') {
                    section.querySelectorAll('.resume-item').forEach(item => {
                        const t = item.querySelector('.resume-item-title');
                        const d = item.querySelector('.resume-item-date');
                        const desc = item.querySelector('.resume-item-desc');
                        if (t) {
                            const parts = t.textContent.split('·').map(s => s.trim());
                            education.push({
                                school: parts[0] || '', degree: parts[1] || '', major: parts[2] || '',
                                time: d ? d.textContent.trim() : '',
                                courses: desc ? desc.textContent.replace('主修课程：', '').trim() : '',
                            });
                        }
                    });
                } else if (titleText === '实习经历') {
                    section.querySelectorAll('.resume-item').forEach(item => {
                        const t = item.querySelector('.resume-item-title');
                        const d = item.querySelector('.resume-item-date');
                        const sub = item.querySelector('.resume-item-subtitle');
                        const lis = item.querySelectorAll('.resume-item-desc li');
                        internship_exp.push({
                            role: t ? t.textContent.trim() : '',
                            time: d ? d.textContent.trim() : '',
                            company: sub ? sub.textContent.trim() : '',
                            description: Array.from(lis).map(li => li.textContent.trim()),
                        });
                    });
                } else if (titleText === '项目经历') {
                    section.querySelectorAll('.resume-item').forEach(item => {
                        const t = item.querySelector('.resume-item-title');
                        const d = item.querySelector('.resume-item-date');
                        const lis = item.querySelectorAll('.resume-item-desc li');
                        if (t) {
                            const txt = t.textContent;
                            const idx = txt.indexOf('|');
                            project_exp.push({
                                name: idx >= 0 ? txt.substring(0, idx).trim() : txt.trim(),
                                role: idx >= 0 ? txt.substring(idx + 1).trim() : '',
                                time: d ? d.textContent.trim() : '',
                                description: Array.from(lis).map(li => li.textContent.trim()),
                            });
                        }
                    });
                } else if (titleText === '个人优势') {
                    section.querySelectorAll('.resume-item-desc li').forEach(li => {
                        personal_strengths.push(li.textContent.trim());
                    });
                }
            });

            return { basic_info, education, internship_exp, project_exp, personal_strengths };
        }

        async function generateDemoResume() {
            try {
                const demoData = {
                    basic_info: { name: "范炜乾", phone: "138-xxxx-xxxx", email: "xxx@qq.com" },
                    education: [{ school: "南昌大学", degree: "211/双一流 · 本科", major: "工商管理", time: "2022.09 - 2026.06", courses: "管理学、市场营销、消费者行为学、商业数据分析" }],
                    internship_exp: [{ company: "字节跳动", role: "产品运营实习生", time: "2024.06 - 2024.09", description: ["负责产品运营相关工作", "参与用户增长策略制定"] }],
                    project_exp: [
                        { name: "微信小程序开发项目", role: "产品负责人", time: "2023.09 ~ 2023.12", description: ["需求分析：针对大学生校园闲置物品交易痛点，通过线上问卷调研提取核心诉求", "产品设计：独立完成产品业务流程图与核心页面原型设计", "AI辅研：运用Claude Code辅助编写前后端逻辑，缩短开发周期"] },
                        { name: "To-Do App 开发项目", role: "产品负责人", time: "2024.01 ~ 2024.04", description: ["竞品分析：深度体验市面主流任务管理产品，输出竞品分析报告", "功能落地：主导规划任务创建、分类标签、状态追踪等核心模块", "迭代优化：组织内测用户进行产品体验，收集有效反馈并优化交互细节"] }
                    ],
                    personal_strengths: ["产品专业技能：具备独立的产品规划与落地能力，熟练掌握需求拆解、竞品分析、流程图绘制", "AI工具应用：深度掌握Claude Code、ChatGPT等前沿AI工具在实际业务中的应用", "商业与同理心：依托工商管理专业背景，具备扎实的商业逻辑与市场洞察力"]
                };
                const data = await apiFetch('/resume', { method: 'POST', body: JSON.stringify(demoData) });
                hasResume = true;
                currentResumeData = data;
                document.getElementById('resumePreview').innerHTML = renderResumeHTML(data);
                showToast('简历生成成功！');
            } catch (err) { showToast(err.message, 'error'); }
        }

        // 对话历史
        let chatHistory = [];

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();

            // 检查是否有上传的文件或消息
            if (!message && !uploadedFile) return;

            let fullMessage = message;
            let fileIds = [];

            // 如果有上传的文件，先上传到文件服务
            if (uploadedFile) {
                const loadingId = addLoadingMessage();
                try {
                    const formData = new FormData();
                    formData.append('file', uploadedFile);
                    const token = localStorage.getItem('token');
                    const res = await fetch(`${API_BASE}/files/upload`, {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${token}` },
                        body: formData
                    });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.detail || '上传失败');

                    // 保存 file_id
                    fileIds.push(data.file_id);
                    uploadedFileId = data.file_id;

                    // 将上传结果添加到消息中
                    const fileInfo = `📎 已上传文件：${uploadedFile.name}`;
                    fullMessage = fullMessage ? `${fileInfo}\n${message}` : fileInfo;

                    removeMessage(loadingId);
                } catch (err) {
                    removeMessage(loadingId);
                    addMessage(`❌ 文件上传失败：${err.message}`, 'ai');
                    showToast(err.message, 'error');
                    return;
                } finally {
                    // 清除上传状态
                    removeUploadedFile();
                }
            }

            if (!fullMessage) return;

            // 添加用户消息
            addMessage(fullMessage, 'user');
            chatHistory.push({ role: 'user', content: fullMessage });
            input.value = '';
            input.style.height = 'auto';

            // 创建流式消息容器
            const messageId = createStreamMessage();

            try {
                // 调用流式 API
                const token = localStorage.getItem('token');
                const response = await fetch(`${API_BASE}/agent/chat/stream`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        message: message,  // 原始消息（不含文件信息）
                        file_ids: fileIds,
                        scenario: 'resume',
                        session_id: currentSessionId || undefined,
                    })
                });

                if (!response.ok) {
                    throw new Error('请求失败');
                }

                // 读取 SSE 流
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let thinkingText = '';
                let contentText = '';
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });

                    // 解析 SSE 事件
                    const lines = buffer.split('\n');
                    buffer = lines.pop() || '';

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.slice(6));

                                if (data.type === 'thinking') {
                                    thinkingText += data.data;
                                    updateStreamMessage(messageId, thinkingText, contentText, true);
                                } else if (data.type === 'content') {
                                    contentText += data.data;
                                    updateStreamMessage(messageId, thinkingText, contentText, false);
                                } else if (data.type === 'resume') {
                                    // 更新简历预览
                                    hasResume = true;
                                    currentResumeData = data.data;
                                    document.getElementById('resumePreview').innerHTML = renderResumeHTML(data.data);
                                    showToast('简历已更新');
                                } else if (data.type === 'done') {
                                    // 流结束
                                    finalizeStreamMessage(messageId, thinkingText, contentText);
                                    chatHistory.push({ role: 'assistant', content: contentText });
                                    // 保存 session_id
                                    if (data.data && data.data.session_id) {
                                        currentSessionId = data.data.session_id;
                                    }
                                }
                            } catch (e) {
                                // 忽略解析错误
                            }
                        }
                    }
                }

            } catch (err) {
                finalizeStreamMessage(messageId, '', `❌ 处理异常：${err.message}`);
            }
        }

        // 流式消息相关函数
        let streamMessageCounter = 0;

        function createStreamMessage() {
            const chatMessages = document.getElementById('chatMessages');
            const id = 'stream-' + (++streamMessageCounter);
            const div = document.createElement('div');
            div.id = id;
            div.className = 'message ai';
            div.innerHTML = `
                <div class="message-avatar">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/>
                    </svg>
                </div>
                <div class="message-body">
                    <div class="message-thinking" id="${id}-thinking" style="display: none;">
                        <div class="thinking-header">

        async function exportHTML(filename) {
            const preview = document.getElementById('resumePreview');
            const content = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${filename}的简历</title><style>body{font-family:'Microsoft YaHei','PingFang SC',sans-serif;max-width:800px;margin:40px auto;padding:20px;color:#333;line-height:1.6;}h1{text-align:center;margin-bottom:4px;font-size:28px;}h2{border-bottom:1px solid #ddd;padding-bottom:4px;margin-top:24px;font-size:16px;}.subtitle{text-align:center;color:#666;font-size:14px;}.contact{text-align:center;color:#999;font-size:12px;margin-bottom:20px;}.contact span{margin:0 8px;}.resume-item{margin-bottom:14px;}.resume-item-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;}.resume-item-title{font-size:14px;font-weight:600;}.resume-item-date{font-size:12px;color:#999;}.resume-item-subtitle{font-size:13px;color:#666;margin-bottom:6px;}.resume-item-desc{font-size:13px;color:#666;line-height:1.6;}ul{padding-left:20px;}li{margin-bottom:4px;}</style></head><body>${preview.innerHTML}</body></html>`;
            const blob = new Blob([content], { type: 'text/html;charset=utf-8' });
            downloadBlob(blob, filename + '.html');
        }

        async function exportFromBackend(filename, format) {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = 'login.html';
                throw new Error('请先登录');
            }
            const url = `${API_BASE}/resume/export?format=${format}&filename=${encodeURIComponent(filename)}`;
            const res = await fetch(url, {
                method: 'GET',
                headers: { 'Authorization': `Bearer ${token}` }
            });

            if (res.status === 401) {
                localStorage.removeItem('token');
                localStorage.removeItem('isLoggedIn');
                window.location.href = 'login.html';
                throw new Error('登录已过期，请重新登录');
            }

            if (!res.ok) {
                const data = await res.json().catch(() => ({}));
                throw new Error(data.detail || '导出失败');
            }

            const blob = await res.blob();
            const ext = format === 'pdf' ? '.pdf' : '.docx';
            downloadBlob(blob, filename + ext);
        }

        function downloadBlob(blob, filename) {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function uploadResume() {
            const fileInput = document.createElement('input');
            fileInput.type = 'file'; fileInput.accept = '.pdf,.docx'; fileInput.style.display = 'none';
            document.body.appendChild(fileInput);
            fileInput.onchange = function() {
                const file = fileInput.files[0]; if (!file) return;
                const ext = '.' + file.name.split('.').pop().toLowerCase();
                if (!['.pdf', '.docx'].includes(ext)) {
                    showToast('仅支持 PDF 和 DOCX 格式', 'error');
                    document.body.removeChild(fileInput);
                    return;
                }
                if (file.size > 10 * 1024 * 1024) {
                    showToast('文件过大，最大支持 10MB', 'error');
                    document.body.removeChild(fileInput);
                    return;
                }
                // 存储文件并显示状态
                uploadedFile = file;
                document.getElementById('uploadFileName').textContent = file.name;
                document.getElementById('uploadStatus').style.display = 'block';
                showToast('文件已添加，点击发送后由 AI 处理');
                document.body.removeChild(fileInput);
            };
            fileInput.click();
        }

        }

        document.getElementById('messageInput').addEventListener('input', function() {
            this.style.height = 'auto'; this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });

        // ===== 视图切换 =====
        function showWelcomeView() {
            document.getElementById('welcomeView').style.display = 'flex';
            document.getElementById('chatView').style.display = 'none';
        }

        function showChatView() {
            document.getElementById('welcomeView').style.display = 'none';
            document.getElementById('chatView').style.display = 'flex';
            document.getElementById('messageInput').focus();
        }

        // ===== 首页大聊天框 =====
        function handleWelcomeKeyDown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendWelcomeMessage();
            }
        }

        function quickSend(text) {
            document.getElementById('welcomeInput').value = text;
            sendWelcomeMessage();
        }

        async function sendWelcomeMessage() {
            const input = document.getElementById('welcomeInput');
            const message = input.value.trim();
            if (!message) return;

            // 切换到聊天视图
            showChatView();

            // 将消息填入聊天输入框并发送
            document.getElementById('messageInput').value = message;
            input.value = '';
            await sendMessage();
        }

        // ===== 新建会话 =====
        function newSession() {
            currentSessionId = null;
            // 清空聊天区域
            const chatMessages = document.getElementById('chatMessages');
            chatMessages.innerHTML = '';
            document.getElementById('sessionInfo').textContent = '新会话';
            showWelcomeView();
        }

        // ===== 恢复会话 =====
        async function restoreSession(sessionId) {
            try {
                const state = await apiFetch(`/agent/sessions/${sessionId}/load`);
                if (!state || !state.messages) {
                    showToast('会话数据为空', 'error');
                    return;
                }

                currentSessionId = sessionId;

                // 清空聊天区域
                const chatMessages = document.getElementById('chatMessages');
                chatMessages.innerHTML = '';

                // 渲染历史消息
                const messages = state.messages;
                for (const msg of messages) {
                    if (msg.role === 'user') {
                        addMessage(msg.content, 'user');
                    } else if (msg.role === 'assistant' && msg.content) {
                        addMessage(msg.content, 'ai');
                    }
                }

                // 更新会话信息
                const stage = state.stage || '';
                document.getElementById('sessionInfo').textContent = stage || `会话 #${sessionId.slice(0, 8)}`;

                showToast('会话已恢复');
                showChatView();
            } catch (err) {
                showToast('恢复会话失败：' + err.message, 'error');
            }
        }

        // ===== 初始化 =====
        (async function init() {
            const token = localStorage.getItem('token');
            if (!token) { window.location.href = 'login.html'; return; }
            await loadResume();

            // 检查是否有已有会话，如果有则加载最近的一次
            try {
                const data = await apiFetch('/agent/sessions?scenario=resume');
                const sessions = data.sessions || [];
                if (sessions.length > 0) {
                    // 加载最近的会话
                    await restoreSession(sessions[0].session_id);
                } else {
                    // 无会话，显示首页
                    showWelcomeView();
                }
            } catch (err) {
                // 加载失败，显示首页
                showWelcomeView();
            }
        })();
    </script>
</body>
</html>
