<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>面试分析报告 - AI 面试官</title>
    <style>
        /* ===== CSS 变量 ===== */
        :root {
            --white: #ffffff;
            --black: #000000;
            --gray-50: #fafafa;
            --gray-100: #f5f5f5;
            --gray-200: #e5e5e5;
            --gray-300: #d4d4d4;
            --gray-400: #a3a3a3;
            --gray-500: #737373;
            --gray-600: #525252;
            --gray-700: #404040;
            --gray-800: #262626;
            --gray-900: #171717;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --primary-bg: #eff6ff;
            --success: #22c55e;
            --success-bg: #f0fdf4;
            --warning: #eab308;
            --warning-bg: #fefce8;
            --error: #ef4444;
            --error-bg: #fef2f2;
            --radius: 8px;
            --radius-lg: 12px;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1);
            --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        /* ===== 全局重置 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font);
            background: var(--gray-50);
            color: var(--gray-800);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* ===== 布局：sidebar + main ===== */
        .container {
            display: flex;
            min-height: 100vh;
        }

        /* ===== 侧边栏 ===== */
        .sidebar {
            width: 72px;
            background: var(--white);
            border-right: 1px solid var(--gray-200);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px 0;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            z-index: 100;
        }

        .sidebar-logo {
            width: 40px;
            height: 40px;
            background: var(--primary);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--white);
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .nav-back {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--gray-500);
            text-decoration: none;
            transition: all 0.2s;
            margin-bottom: 8px;
        }

        .nav-back:hover {
            background: var(--gray-100);
            color: var(--gray-700);
        }

        .nav-back svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        .nav-divider {
            width: 24px;
            height: 1px;
            background: var(--gray-200);
            margin: 8px 0 16px;
        }

        .nav-links {
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex: 1;
        }

        .nav-item {
            width: 48px;
            height: 48px;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: var(--gray-400);
            font-size: 10px;
            transition: all 0.2s;
            gap: 2px;
        }

        .nav-item:hover {
            background: var(--gray-100);
            color: var(--gray-600);
        }

        .nav-item.active {
            background: var(--primary-bg);
            color: var(--primary);
        }

        .nav-item svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        /* ===== 主内容区 ===== */
        .main-content {
            flex: 1;
            margin-left: 72px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* ===== 顶部会话信息（20%） ===== */
        .session-header {
            background: var(--white);
            border-bottom: 1px solid var(--gray-200);
            padding: 32px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 24px;
            min-height: 160px;
        }

        .session-info {
            flex: 1;
            min-width: 0;
        }

        .session-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--gray-900);
            margin-bottom: 12px;
            line-height: 1.3;
        }

        .session-meta {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: var(--gray-400);
        }

        .meta-item svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
            flex-shrink: 0;
        }

        .session-score {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
        }

        .score-circle {
            width: 88px;
            height: 88px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: 800;
            position: relative;
        }

        .score-circle::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 4px solid;
            border-color: inherit;
            opacity: 0.15;
        }

        .score-circle.high {
            color: var(--success);
            border-color: var(--success);
            background: var(--success-bg);
        }

        .score-circle.medium {
            color: var(--warning);
            border-color: var(--warning);
            background: var(--warning-bg);
        }

        .score-circle.low {
            color: var(--error);
            border-color: var(--error);
            background: var(--error-bg);
        }

        .score-label {
            font-size: 12px;
            color: var(--gray-400);
            font-weight: 500;
        }

        /* ===== 下半部分：问题列表（80%） ===== */
        .questions-section {
            flex: 1;
            padding: 32px 40px;
            overflow-y: auto;
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--gray-700);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title svg {
            width: 20px;
            height: 20px;
            fill: var(--gray-500);
        }

        /* ===== 问题卡片 ===== */
        .question-card {
            background: var(--white);
            border: 1px solid var(--gray-200);
            border-radius: var(--radius-lg);
            margin-bottom: 16px;
            overflow: hidden;
            transition: box-shadow 0.2s;
        }

        .question-card:hover {
            box-shadow: var(--shadow-md);
        }

        .question-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            cursor: pointer;
            user-select: none;
            gap: 16px;
        }

        .question-header:hover {
            background: var(--gray-50);
        }

        .question-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            min-width: 0;
        }

        .question-number {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: var(--primary-bg);
            color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 700;
            flex-shrink: 0;
        }

        .question-text {
            font-size: 14px;
            font-weight: 500;
            color: var(--gray-800);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .question-right {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .question-score {
            font-size: 20px;
            font-weight: 700;
            min-width: 48px;
            text-align: right;
        }

        .question-score.high { color: var(--success); }
        .question-score.medium { color: var(--warning); }
        .question-score.low { color: var(--error); }

        .chevron {
            width: 20px;
            height: 20px;
            fill: var(--gray-400);
            transition: transform 0.2s;
        }

        .question-card.expanded .chevron {
            transform: rotate(180deg);
        }

        /* ===== 问题详情（展开区域） ===== */
        .question-detail {
            display: none;
            padding: 0 20px 20px;
            border-top: 1px solid var(--gray-100);
        }

        .question-card.expanded .question-detail {
            display: block;
        }

        .detail-section {
            margin-top: 16px;
        }

        .detail-label {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .detail-label.positive {
            color: var(--success);
        }

        .detail-label.negative {
            color: var(--warning);
        }

        .detail-label svg {
            width: 14px;
            height: 14px;
            fill: currentColor;
        }

        .detail-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .detail-list li {
            font-size: 13px;
            color: var(--gray-600);
            padding-left: 20px;
            position: relative;
            line-height: 1.5;
        }

        .detail-list li::before {
            content: '';
            position: absolute;
            left: 0;
            top: 8px;
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }

        .detail-list.positive li::before {
            background: var(--success);
        }

        .detail-list.negative li::before {
            background: var(--warning);
        }

        .score-bar-container {
            margin-top: 16px;
        }

        .score-bar-label {
            font-size: 12px;
            color: var(--gray-500);
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
        }

        .score-bar {
            height: 6px;
            background: var(--gray-100);
            border-radius: 3px;
            overflow: hidden;
        }

        .score-bar-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.6s ease;
        }

        .score-bar-fill.high { background: var(--success); }
        .score-bar-fill.medium { background: var(--warning); }
        .score-bar-fill.low { background: var(--error); }

        /* ===== 整体点评 ===== */
        .overall-card {
            background: var(--white);
            border: 1px solid var(--gray-200);
            border-radius: var(--radius-lg);
            margin-top: 24px;
            overflow: hidden;
        }

        .overall-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 20px 24px;
            background: linear-gradient(135deg, var(--primary-bg), #f0f4ff);
            border-bottom: 1px solid var(--gray-200);
        }

        .overall-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .overall-icon svg {
            width: 22px;
            height: 22px;
            fill: var(--white);
        }

        .overall-title {
            font-size: 17px;
            font-weight: 700;
            color: var(--gray-900);
        }

        .overall-body {
            padding: 24px;
        }

        .overall-summary {
            font-size: 14px;
            color: var(--gray-600);
            line-height: 1.8;
            margin-bottom: 24px;
        }

        .tag-section {
            margin-bottom: 20px;
        }

        .tag-section-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--gray-700);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .tag-section-title svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }

        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .tag.strength {
            background: var(--success-bg);
            color: #16a34a;
            border: 1px solid #bbf7d0;
        }

        .tag.suggestion {
            background: var(--warning-bg);
            color: #ca8a04;
            border: 1px solid #fef08a;
        }

        .recommendation {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 20px;
            background: var(--gray-50);
            border-radius: var(--radius);
            border: 1px solid var(--gray-200);
        }

        .recommendation-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .recommendation-icon.pass {
            background: var(--success-bg);
            color: var(--success);
        }

        .recommendation-icon.fail {
            background: var(--error-bg);
            color: var(--error);
        }

        .recommendation-text {
            font-size: 14px;
            font-weight: 600;
            color: var(--gray-800);
        }

        .recommendation-desc {
            font-size: 12px;
            color: var(--gray-500);
            margin-top: 2px;
        }

        /* ===== 返回面试列表按钮 ===== */
        .back-to-list {
            display: flex;
            justify-content: center;
            padding: 24px 0 40px;
        }

        .back-to-list .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        /* ===== 按钮 ===== */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 10px 20px;
            border-radius: var(--radius);
            font-size: 14px;
            font-weight: 500;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            font-family: var(--font);
        }

        .btn svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }

        .btn-primary {
            background: var(--primary);
            color: var(--white);
        }

        .btn-primary:hover {
            background: var(--primary-hover);
        }

        .btn-secondary {
            background: var(--white);
            color: var(--gray-700);
            border: 1px solid var(--gray-200);
        }

        .btn-secondary:hover {
            background: var(--gray-50);
            border-color: var(--gray-300);
        }

        /* ===== 加载/空状态 ===== */
        .loading-state, .error-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 20px;
            text-align: center;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--gray-200);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text, .error-text {
            font-size: 14px;
            color: var(--gray-500);
        }

        .error-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 768px) {
            .sidebar {
                width: 60px;
            }
            .main-content {
                margin-left: 60px;
            }
            .session-header {
                flex-direction: column;
                align-items: flex-start;
                padding: 24px 20px;
                min-height: auto;
            }
            .session-score {
                align-self: flex-end;
            }
            .questions-section {
                padding: 24px 16px;
            }
            .question-text {
                white-space: normal;
            }
            .session-meta {
                gap: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- ===== 侧边栏 ===== -->
        <aside class="sidebar">
            <div class="sidebar-logo">AI</div>
            <a href="index.html" class="nav-back" title="返回首页">
                <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
            </a>
            <div class="nav-divider"></div>
            <nav class="nav-links">
                <a href="ai-resume-assistant.html" class="nav-item" title="简历助手">
                    <svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm-1 7V3.5L18.5 9H13zM6 20V4h5v7h7v9H6z"/></svg>
                    <span>简历</span>
                </a>
                <a href="ai-job-finder.html" class="nav-item" title="岗位寻找">
                    <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                    <span>职位</span>
                </a>
                <a href="ai-interview.html" class="nav-item active" title="AI面试官">
                    <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 2.99-1.34 2.99-3L15 5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/></svg>
                    <span>面试</span>
                </a>
            </nav>
        </aside>

        <!-- ===== 主内容区 ===== -->
        <main class="main-content" id="mainContent">
            <!-- 加载中状态 -->
            <div class="loading-state" id="loadingState">
                <div class="loading-spinner"></div>
                <div class="loading-text">正在加载分析报告...</div>
            </div>
        </main>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000';

        // ===== 页面初始化 =====
        document.addEventListener('DOMContentLoaded', () => {
            checkAuth();
            const sessionId = getSessionId();
            if (!sessionId) {
                showError('未找到面试会话 ID，请从面试列表进入。');
                return;
            }
            loadReport(sessionId);
        });

        /** 检查登录状态 */
        function checkAuth() {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = 'login.html';
            }
        }

        /** 从 URL 获取 session_id */
        function getSessionId() {
            const params = new URLSearchParams(window.location.search);
            return params.get('session_id');
        }

        // ===== 加载报告数据 =====
        async function loadReport(sessionId) {
            // 模拟网络延迟
            await new Promise(r => setTimeout(r, 600));
            const data = getMockReport(sessionId);

            renderReport(data);
        }

        // ===== 渲染报告 =====
        function renderReport(report) {
            const main = document.getElementById('mainContent');
            const scoreClass = getScoreClass(report.totalScore);

            main.innerHTML = `
                <!-- 顶部：会话信息 -->
                <div class="session-header">
                    <div class="session-info">
                        <div class="session-title">${escapeHtml(report.title)}</div>
                        <div class="session-meta">
                            <span class="meta-item">
                                <svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg>
                                ${escapeHtml(report.duration)}
                            </span>
                            <span class="meta-item">
                                <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H5.17L4 17.17V4h16v12z"/><path d="M12 10l-1.41 1.41L13.17 14H8v2h5.17l-2.58 2.58L12 20l5-5z"/></svg>
                                ${report.questionCount} 道题
                            </span>
                            <span class="meta-item">
                                <svg viewBox="0 0 24 24"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11zM9 10H7v2h2v-2zm4 0h-2v2h2v-2zm4 0h-2v2h2v-2z"/></svg>
                                ${escapeHtml(report.startTime)}
                            </span>
                        </div>
                    </div>
                    <div class="session-score">
                        <div class="score-circle ${scoreClass}">${report.totalScore}</div>
                        <span class="score-label">综合评分</span>
                    </div>
                </div>

                <!-- 下半部分：问题点评 -->
                <div class="questions-section">
                    <div class="section-title">
                        <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H5.17L4 17.17V4h16v12z"/></svg>
                        逐题点评
                    </div>

                    ${report.questions.map((q, i) => renderQuestionCard(q, i)).join('')}

                    <!-- 整体点评 -->
                    ${renderOverallCard(report.overallReview)}

                    <!-- 返回按钮 -->
                    <div class="back-to-list">
                        <a href="ai-interview.html" class="btn btn-secondary">
                            <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
                            返回面试列表
                        </a>
                    </div>
                </div>
            `;
        }

        /** 渲染单个问题卡片 */
        function renderQuestionCard(q, index) {
            const scoreClass = getScoreClass(q.score);
            return `
                <div class="question-card" data-id="${q.id}">
                    <div class="question-header" onclick="toggleQuestion(this)">
                        <div class="question-left">
                            <div class="question-number">Q${index + 1}</div>
                            <div class="question-text">${escapeHtml(q.question)}</div>
                        </div>
                        <div class="question-right">
                            <span class="question-score ${scoreClass}">${q.score}分</span>
                            <svg class="chevron" viewBox="0 0 24 24"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/></svg>
                        </div>
                    </div>
                    <div class="question-detail">
                        <div class="score-bar-container">
                            <div class="score-bar-label">
                                <span>得分</span>
                                <span>${q.score} / 100</span>
                            </div>
                            <div class="score-bar">
                                <div class="score-bar-fill ${scoreClass}" style="width: 0%;" data-target="${q.score}"></div>
                            </div>
                        </div>

                        ${q.highlights.length > 0 ? `
                        <div class="detail-section">
                            <div class="detail-label positive">
                                <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
                                回答亮点
                            </div>
                            <ul class="detail-list positive">
                                ${q.highlights.map(h => `<li>${escapeHtml(h)}</li>`).join('')}
                            </ul>
                        </div>
                        ` : ''}

                        ${q.improvements.length > 0 ? `
                        <div class="detail-section">
                            <div class="detail-label negative">
                                <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
                                待改进
                            </div>
                            <ul class="detail-list negative">
                                ${q.improvements.map(i => `<li>${escapeHtml(i)}</li>`).join('')}
                            </ul>
                        </div>
                        ` : ''}
                    </div>
                </div>
            `;
        }

        /** 渲染整体点评卡片 */
        function renderOverallCard(review) {
            return `
                <div class="overall-card">
                    <div class="overall-header">
                        <div class="overall-icon">
                            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
                        </div>
                        <div class="overall-title">整体点评</div>
                    </div>
                    <div class="overall-body">
                        <div class="overall-summary">${escapeHtml(review.summary)}</div>

                        <div class="tag-section">
                            <div class="tag-section-title" style="color: var(--success);">
                                <svg viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
                                优势
                            </div>
                            <div class="tags">
                                ${review.strengths.map(s => `<span class="tag strength">${escapeHtml(s)}</span>`).join('')}
                            </div>
                        </div>

                        <div class="tag-section">
                            <div class="tag-section-title" style="color: var(--warning);">
                                <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
                                改进建议
                            </div>
                            <div class="tags">
                                ${review.suggestions.map(s => `<span class="tag suggestion">${escapeHtml(s)}</span>`).join('')}
                            </div>
                        </div>

                        <div class="recommendation">
                            <div class="recommendation-icon ${review.recommendation === '通过' ? 'pass' : 'fail'}">
                                ${review.recommendation === '通过' ? '✓' : '✗'}
                            </div>
                            <div>
                                <div class="recommendation-text">建议：${escapeHtml(review.recommendation)}</div>
                                <div class="recommendation-desc">${review.recommendation === '通过' ? '候选人表现良好，建议进入下一轮' : '候选人需要进一步提升相关能力'}</div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // ===== 交互逻辑 =====

        /** 展开/折叠问题卡片 */
        function toggleQuestion(header) {
            const card = header.closest('.question-card');
            const wasExpanded = card.classList.contains('expanded');

            // 关闭其他已展开的卡片
            document.querySelectorAll('.question-card.expanded').forEach(c => {
                c.classList.remove('expanded');
            });

            // 切换当前卡片
            if (!wasExpanded) {
                card.classList.add('expanded');
                // 触发分数条动画
                const bar = card.querySelector('.score-bar-fill');
                if (bar) {
                    setTimeout(() => {
                        bar.style.width = bar.dataset.target + '%';
                    }, 50);
                }
            }
        }

        // ===== 工具函数 =====

        function getScoreClass(score) {
            if (score >= 80) return 'high';
            if (score >= 60) return 'medium';
            return 'low';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showError(message) {
            const main = document.getElementById('mainContent');
            main.innerHTML = `
                <div class="error-state">
                    <div class="error-icon">😢</div>
                    <div class="error-text">${escapeHtml(message)}</div>
                    <div style="margin-top: 20px;">
                        <a href="ai-interview.html" class="btn btn-primary">返回面试列表</a>
                    </div>
                </div>
            `;
        }
