<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI求职助手</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --white: #ffffff;
            --black: #000000;
            --gray-50: #fafafa;
            --gray-100: #f5f5f5;
            --gray-200: #e5e5e5;
            --gray-300: #d4d4d4;
            --gray-400: #a3a3a3;
            --gray-500: #737373;
            --gray-600: #525252;
            --gray-700: #404040;
            --gray-800: #262626;
            --gray-900: #171717;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--white);
            min-height: 100vh;
            color: var(--gray-900);
            line-height: 1.6;
        }

        .container {
            display: flex;
            min-height: 100vh;
        }

        /* 左侧导航栏 */
        .sidebar {
            width: 80px;
            min-width: 80px;
            background: var(--white);
            border-right: 1px solid var(--gray-200);
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .sidebar.collapsed {
            width: 0;
            min-width: 0;
            padding: 0;
            overflow: hidden;
            border-right: none;
        }

        .sidebar-avatar {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: var(--gray-900);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 32px;
            cursor: pointer;
        }

        .sidebar-avatar svg {
            width: 24px;
            height: 24px;
            fill: var(--white);
        }

        .sidebar-nav {
            width: 100%;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px 8px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            color: var(--gray-400);
        }

        .nav-item:hover {
            color: var(--gray-900);
            background: var(--gray-100);
        }

        .nav-item.active {
            color: var(--gray-900);
            background: var(--gray-100);
        }

        .nav-item svg {
            width: 22px;
            height: 22px;
            margin-bottom: 4px;
            fill: currentColor;
        }

        .nav-item span {
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.02em;
        }

        .sidebar-toggle {
            position: fixed;
            left: 80px;
            top: 24px;
            width: 28px;
            height: 28px;
            background: var(--white);
            border: 1px solid var(--gray-200);
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            z-index: 101;
        }

        .sidebar-toggle:hover {
            border-color: var(--gray-400);
        }

        .sidebar-toggle svg {
            width: 14px;
            height: 14px;
            fill: var(--gray-500);
            transition: transform 0.2s ease;
        }

        .sidebar.collapsed ~ .sidebar-toggle {
            left: 0;
        }

        .sidebar.collapsed ~ .sidebar-toggle svg {
            transform: rotate(180deg);
        }

        /* 主内容区 */
        .main-content {
            flex: 1;
            padding: 48px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* 个人信息展示栏 */
        .profile-section {
            margin-bottom: 64px;
            animation: fadeIn 0.6s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .profile-content {
            display: flex;
            align-items: flex-start;
            gap: 40px;
        }

        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            background: var(--gray-100);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .profile-avatar svg {
            width: 40px;
            height: 40px;
            fill: var(--gray-400);
        }

        .profile-info {
            flex: 1;
        }

        .profile-greeting {
            font-size: 14px;
            color: var(--gray-500);
            margin-bottom: 4px;
            font-weight: 400;
        }

        .profile-name {
            font-size: 32px;
            font-weight: 700;
            color: var(--gray-900);
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }

        .profile-title {
            font-size: 16px;
            color: var(--gray-500);
            margin-bottom: 24px;
        }

        .profile-stats {
            display: flex;
            gap: 32px;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--gray-900);
            letter-spacing: -0.02em;
        }

        .stat-label {
            font-size: 12px;
            color: var(--gray-400);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .profile-actions {
            display: flex;
            gap: 12px;
            align-self: flex-start;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: 'Inter', sans-serif;
        }

        .btn-primary {
            background: var(--gray-900);
            color: var(--white);
            border: none;
        }

        .btn-primary:hover {
            background: var(--gray-800);
        }

        .btn-secondary {
            background: var(--white);
            color: var(--gray-700);
            border: 1px solid var(--gray-200);
        }

        .btn-secondary:hover {
            border-color: var(--gray-400);
            color: var(--gray-900);
        }

        .btn svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }

        /* 功能板块 */
        .features-section {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            animation: fadeIn 0.6s ease 0.2s both;
        }

        .feature-card {
            background: var(--white);
            border: 1px solid var(--gray-200);
            border-radius: 16px;
            padding: 32px;
            display: flex;
            flex-direction: column;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .feature-card:hover {
            border-color: var(--gray-400);
            transform: translateY(-2px);
        }

        .feature-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }

        .feature-icon svg {
            width: 24px;
            height: 24px;
        }

        .feature-icon.resume {
            background: #fef2f2;
        }

        .feature-icon.resume svg {
            fill: #ef4444;
        }

        .feature-icon.job {
            background: #eff6ff;
        }

        .feature-icon.job svg {
            fill: #3b82f6;
        }

        .feature-icon.interview {
            background: #f0fdf4;
        }

        .feature-icon.interview svg {
            fill: #22c55e;
        }

        .feature-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--gray-900);
            margin-bottom: 8px;
            letter-spacing: -0.01em;
        }

        .feature-desc {
            font-size: 14px;
            color: var(--gray-500);
            line-height: 1.6;
            margin-bottom: 24px;
            flex: 1;
        }

        .feature-btn {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--gray-200);
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: var(--gray-700);
            background: var(--white);
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
        }

        .feature-btn:hover {
            border-color: var(--gray-900);
            color: var(--gray-900);
        }

        /* 响应式设计 */
        @media (max-width: 1200px) {
            .features-section {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                bottom: 0;
                width: 240px;
                transform: translateX(-100%);
                transition: transform 0.3s ease;
                border-right: 1px solid var(--gray-200);
            }

            .sidebar.active {
                transform: translateX(0);
            }

            .sidebar-toggle {
                left: 16px;
                top: 16px;
            }

            .sidebar.collapsed ~ .sidebar-toggle {
                left: 16px;
            }

            .main-content {
                padding: 24px;
                padding-top: 72px;
            }

            .profile-content {
                flex-direction: column;
                gap: 24px;
            }

            .profile-actions {
                width: 100%;
            }

            .btn {
                flex: 1;
                justify-content: center;
            }

            .features-section {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 左侧导航栏 -->
        <nav class="sidebar" id="sidebar">
            <div class="sidebar-avatar">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                </svg>
            </div>
            <div class="sidebar-nav">
                <a href="#home" class="nav-item active">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
                    </svg>
                    <span>首页</span>
                </a>
                <a href="#profile" class="nav-item">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                    </svg>
                    <span>个人信息</span>
                </a>
                <a href="ai-resume-assistant.html" class="nav-item">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/>
                    </svg>
                    <span>简历</span>
                </a>
                <a href="ai-job-finder.html" class="nav-item">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M20 6h-4V4c0-1.11-.89-2-2-2h-4c-1.11 0-2 .89-2 2v2H4c-1.11 0-1.99.89-1.99 2L2 19c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2zm-6 0h-4V4h4v2z"/>
                    </svg>
                    <span>职位</span>
                </a>
                <a href="ai-interview.html" class="nav-item">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM6 9h12v2H6V9zm8 5H6v-2h8v2zm4-6H6V6h12v2z"/>
                    </svg>
                    <span>面试</span>
                </a>
            </div>
        </nav>

        <button class="sidebar-toggle" id="sidebarToggle" onclick="toggleSidebar()">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6 1.41-1.41z"/>
            </svg>
        </button>

        <!-- 主内容区 -->
        <main class="main-content">
            <!-- 个人信息展示栏 -->
            <section class="profile-section">
                <div class="profile-content">
                    <div class="profile-avatar">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                        </svg>
                    </div>
                    <div class="profile-info">
                        <p class="profile-greeting">欢迎回来</p>
                        <h1 class="profile-name">用户</h1>
                        <p class="profile-title">求职者</p>
                        <div class="profile-stats">
                            <div class="stat-item">
                                <span class="stat-value">3</span>
                                <span class="stat-label">已投简历</span>
                            </div>
                            <div class="stat-item">
                                <span class="stat-value">12</span>
                                <span class="stat-label">收藏职位</span>
                            </div>
                            <div class="stat-item">
                                <span class="stat-value">5</span>
                                <span class="stat-label">面试邀请</span>
                            </div>
                        </div>
                    </div>
                    <div class="profile-actions">
                        <a href="ai-resume-assistant.html" class="btn btn-primary">
                            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/>
                            </svg>
                            我的简历
                        </a>
                        <a href="#settings" class="btn btn-secondary">设置</a>
                        <button class="btn btn-secondary" onclick="logout()">退出登录</button>
                    </div>
                </div>
            </section>

            <!-- 功能板块 -->
            <section class="features-section">
                <!-- AI简历助手 -->
                <div class="feature-card" onclick="navigateTo('ai-resume-assistant.html')">
                    <div class="feature-icon resume">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/>
                        </svg>
                    </div>
                    <h2 class="feature-title">AI简历助手</h2>
                    <p class="feature-desc">智能简历优化、内容润色、格式调整。根据目标职位自动匹配关键词。</p>
                    <button class="feature-btn">开始优化</button>
                </div>

                <!-- AI岗位寻找助手 -->
                <div class="feature-card" onclick="navigateTo('ai-job-finder.html')">
                    <div class="feature-icon job">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M20 6h-4V4c0-1.11-.89-2-2-2h-4c-1.11 0-2 .89-2 2v2H4c-1.11 0-1.99.89-1.99 2L2 19c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2zm-6 0h-4V4h4v2z"/>
                        </svg>
                    </div>
                    <h2 class="feature-title">AI岗位寻找</h2>
                    <p class="feature-desc">基于技能和经验智能匹配职位，实时追踪热门岗位。</p>
                    <button class="feature-btn">寻找职位</button>
                </div>

                <!-- AI面试官 -->
                <div class="feature-card" onclick="navigateTo('ai-interview.html')">
                    <div class="feature-icon interview">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM6 9h12v2H6V9zm8 5H6v-2h8v2zm4-6H6V6h12v2z"/>
                        </svg>
                    </div>
                    <h2 class="feature-title">AI面试官</h2>
                    <p class="feature-desc">模拟真实面试场景，提供专业反馈，涵盖多种面试类型。</p>
                    <button class="feature-btn">开始模拟</button>
                </div>
            </section>
        </main>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000';

        // 检查登录状态
        async function checkLogin() {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = 'login.html';
                return false;
            }

            // 用 token 向后端验证并获取用户信息
            try {
                const response = await fetch(`${API_BASE}/auth/me`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!response.ok) {
                    // token 无效或过期，清除登录状态
                    localStorage.removeItem('token');
                    localStorage.removeItem('isLoggedIn');
                    window.location.href = 'login.html';
                    return false;
                }

                const user = await response.json();
                document.querySelector('.profile-name').textContent = user.username;
                localStorage.setItem('username', user.username);
                localStorage.setItem('userEmail', user.email);

            } catch (err) {
                // 后端不可用时，降级使用本地缓存
                const username = localStorage.getItem('username');
                if (username) {
                    document.querySelector('.profile-name').textContent = username;
                }
            }

            // 检查是否完成问卷
            const surveyCompleted = localStorage.getItem('surveyCompleted');
            if (!surveyCompleted) {
                window.location.href = 'survey.html';
                return false;
            }

            return true;
        }

        // 退出登录
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('isLoggedIn');
            localStorage.removeItem('userEmail');
            localStorage.removeItem('username');
            localStorage.removeItem('surveyCompleted');
            localStorage.removeItem('surveyAnswers');
            window.location.href = 'login.html';
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('collapsed');
            if (window.innerWidth <= 768) {
                sidebar.classList.toggle('active');
            }
        }

        function navigateTo(page) {
            window.location.href = page;
        }

        document.addEventListener('click', function(e) {
            const sidebar = document.getElementById('sidebar');
            const toggle = document.getElementById('sidebarToggle');
            if (window.innerWidth <= 768 &&
                !sidebar.contains(e.target) &&
                !toggle.contains(e.target) &&
                sidebar.classList.contains('active')) {
                sidebar.classList.remove('active');
            }
        });

        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', function(e) {
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                this.classList.add('active');
            });
        });

        // 页面加载时检查登录状态
        window.addEventListener('load', checkLogin);
    </script>
</body>
</html>
