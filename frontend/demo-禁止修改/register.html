<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - AI求职助手</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --white: #ffffff;
            --black: #000000;
            --gray-50: #fafafa;
            --gray-100: #f5f5f5;
            --gray-200: #e5e5e5;
            --gray-300: #d4d4d4;
            --gray-400: #a3a3a3;
            --gray-500: #737373;
            --gray-600: #525252;
            --gray-700: #404040;
            --gray-800: #262626;
            --gray-900: #171717;
            --error: #ef4444;
            --success: #22c55e;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--gray-50);
            min-height: 100vh;
            color: var(--gray-900);
            line-height: 1.6;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .register-container {
            width: 100%;
            max-width: 440px;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Logo */
        .logo {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: var(--gray-900);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
        }

        .logo-icon svg {
            width: 24px;
            height: 24px;
            fill: var(--white);
        }

        .logo-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--gray-900);
            letter-spacing: -0.02em;
        }

        .logo-subtitle {
            font-size: 14px;
            color: var(--gray-400);
            margin-top: 4px;
        }

        /* 表单卡片 */
        .form-card {
            background: var(--white);
            border: 1px solid var(--gray-200);
            border-radius: 16px;
            padding: 32px;
        }

        .form-title {
            font-size: 20px;
            font-weight: 600;
            color: var(--gray-900);
            margin-bottom: 8px;
        }

        .form-desc {
            font-size: 14px;
            color: var(--gray-400);
            margin-bottom: 28px;
        }

        /* 表单元素 */
        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--gray-700);
            margin-bottom: 6px;
        }

        .form-input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--gray-200);
            border-radius: 10px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            color: var(--gray-900);
            background: var(--white);
            transition: all 0.2s ease;
            outline: none;
        }

        .form-input:focus {
            border-color: var(--gray-400);
        }

        .form-input::placeholder {
            color: var(--gray-300);
        }

        .form-input.error {
            border-color: var(--error);
        }

        .form-error {
            font-size: 12px;
            color: var(--error);
            margin-top: 6px;
            display: none;
        }

        .form-error.show {
            display: block;
        }

        .form-hint {
            font-size: 12px;
            color: var(--gray-400);
            margin-top: 6px;
        }

        /* 密码输入框 */
        .password-wrapper {
            position: relative;
        }

        .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .password-toggle svg {
            width: 18px;
            height: 18px;
            fill: var(--gray-400);
        }

        .password-toggle:hover svg {
            fill: var(--gray-600);
        }

        /* 密码强度指示器 */
        .password-strength {
            display: flex;
            gap: 4px;
            margin-top: 8px;
        }

        .strength-bar {
            flex: 1;
            height: 3px;
            background: var(--gray-200);
            border-radius: 2px;
            transition: background 0.2s ease;
        }

        .strength-bar.active {
            background: var(--error);
        }

        .strength-bar.active.medium {
            background: var(--success);
        }

        .strength-bar.active.strong {
            background: var(--success);
        }

        .strength-text {
            font-size: 11px;
            color: var(--gray-400);
            margin-top: 4px;
        }

        /* 用户协议 */
        .agreement {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            margin-bottom: 24px;
        }

        .agreement input[type="checkbox"] {
            width: 16px;
            height: 16px;
            border: 1px solid var(--gray-300);
            border-radius: 4px;
            cursor: pointer;
            accent-color: var(--gray-900);
            margin-top: 2px;
            flex-shrink: 0;
        }

        .agreement label {
            font-size: 13px;
            color: var(--gray-500);
            cursor: pointer;
            line-height: 1.5;
        }

        .agreement a {
            color: var(--gray-900);
            text-decoration: none;
            font-weight: 500;
        }

        .agreement a:hover {
            text-decoration: underline;
        }

        /* 提交按钮 */
        .submit-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: var(--gray-900);
            color: var(--white);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
        }

        .submit-btn:hover {
            background: var(--gray-800);
        }

        .submit-btn:disabled {
            background: var(--gray-300);
            cursor: not-allowed;
        }

        .submit-btn .spinner {
            display: none;
            width: 16px;
            height: 16px;
            border: 2px solid var(--white);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin: 0 auto;
        }

        .submit-btn.loading .btn-text {
            display: none;
        }

        .submit-btn.loading .spinner {
            display: block;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* 分割线 */
        .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 24px 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--gray-200);
        }

        .divider span {
            font-size: 12px;
            color: var(--gray-400);
        }

        /* 登录链接 */
        .login-link {
            text-align: center;
            font-size: 14px;
            color: var(--gray-500);
        }

        .login-link a {
            color: var(--gray-900);
            font-weight: 500;
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .login-link a:hover {
            color: var(--gray-700);
        }

        /* Toast提示 */
        .toast {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: var(--gray-900);
            color: var(--white);
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            transition: transform 0.3s ease;
            z-index: 1000;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        .toast.success {
            background: var(--success);
        }

        .toast.error {
            background: var(--error);
        }

        /* 响应式 */
        @media (max-width: 480px) {
            .form-card {
                padding: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="register-container">
        <!-- Logo -->
        <div class="logo">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                </svg>
            </div>
            <h1 class="logo-title">AI求职助手</h1>
            <p class="logo-subtitle">智能求职，高效匹配</p>
        </div>

        <!-- 注册表单 -->
        <div class="form-card">
            <h2 class="form-title">创建账号</h2>
            <p class="form-desc">注册后即可使用AI求职助手</p>

            <form id="registerForm" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label class="form-label" for="username">用户名</label>
                    <input
                        type="text"
                        id="username"
                        class="form-input"
                        placeholder="请输入用户名"
                        required
                    >
                    <div class="form-error" id="usernameError">用户名至少3个字符</div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="email">邮箱</label>
                    <input
                        type="email"
                        id="email"
                        class="form-input"
                        placeholder="请输入邮箱地址"
                        required
                    >
                    <div class="form-error" id="emailError">请输入有效的邮箱地址</div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">密码</label>
                    <div class="password-wrapper">
                        <input
                            type="password"
                            id="password"
                            class="form-input"
                            placeholder="请输入密码（至少6位）"
                            required
                            oninput="checkPasswordStrength()"
                        >
                        <button type="button" class="password-toggle" onclick="togglePassword('password')">
                            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
                            </svg>
                        </button>
                    </div>
                    <div class="password-strength" id="passwordStrength">
                        <div class="strength-bar" id="bar1"></div>
                        <div class="strength-bar" id="bar2"></div>
                        <div class="strength-bar" id="bar3"></div>
                        <div class="strength-bar" id="bar4"></div>
                    </div>
                    <div class="strength-text" id="strengthText"></div>
                    <div class="form-error" id="passwordError">密码至少6个字符</div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="confirmPassword">确认密码</label>
                    <div class="password-wrapper">
                        <input
                            type="password"
                            id="confirmPassword"
                            class="form-input"
                            placeholder="请再次输入密码"
                            required
                        >
                        <button type="button" class="password-toggle" onclick="togglePassword('confirmPassword')">
                            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
                            </svg>
                        </button>
                    </div>
                    <div class="form-error" id="confirmPasswordError">两次密码不一致</div>
                </div>

                <div class="agreement">
                    <input type="checkbox" id="agree" required>
                    <label for="agree">
                        我已阅读并同意 <a href="#">用户协议</a> 和 <a href="#">隐私政策</a>
                    </label>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">
                    <span class="btn-text">注册</span>
                    <div class="spinner"></div>
                </button>
            </form>

            <div class="divider">
                <span>或</span>
            </div>

            <p class="login-link">
                已有账号？ <a href="login.html">立即登录</a>
            </p>
        </div>
    </div>

    <!-- Toast提示 -->
    <div class="toast" id="toast"></div>

    <script>
        const API_BASE = 'http://localhost:8000';

        // 切换密码显示
        function togglePassword(inputId) {
            const passwordInput = document.getElementById(inputId);
            passwordInput.type = passwordInput.type === 'password' ? 'text' : 'password';
        }

        // 显示Toast提示
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // 验证邮箱
        function validateEmail(email) {
            const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return re.test(email);
        }

        // 检查密码强度
        function checkPasswordStrength() {
            const password = document.getElementById('password').value;
            const bars = [
                document.getElementById('bar1'),
                document.getElementById('bar2'),
                document.getElementById('bar3'),
                document.getElementById('bar4')
            ];
            const strengthText = document.getElementById('strengthText');

            bars.forEach(bar => { bar.className = 'strength-bar'; });
            strengthText.textContent = '';
            if (!password) return;

            let strength = 0;
            if (password.length >= 6) strength++;
            if (password.length >= 10) strength++;
            if (/[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^A-Za-z0-9]/.test(password)) strength++;

            const activeBars = Math.min(strength, 4);
            for (let i = 0; i < activeBars; i++) {
                bars[i].classList.add('active');
                if (strength >= 3) bars[i].classList.add('strong');
                else if (strength >= 2) bars[i].classList.add('medium');
            }

            if (strength <= 1) { strengthText.textContent = '弱'; strengthText.style.color = 'var(--error)'; }
            else if (strength <= 2) { strengthText.textContent = '中'; strengthText.style.color = 'var(--success)'; }
            else { strengthText.textContent = '强'; strengthText.style.color = 'var(--success)'; }
        }

        // 处理注册
        async function handleRegister(event) {
            event.preventDefault();

            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const submitBtn = document.getElementById('submitBtn');

            // 重置错误
            document.querySelectorAll('.form-error').forEach(el => el.classList.remove('show'));
            document.querySelectorAll('.form-input').forEach(el => el.classList.remove('error'));

            // 前端验证
            let hasError = false;

            if (username.length < 3) {
                document.getElementById('usernameError').textContent = '用户名至少3个字符';
                document.getElementById('usernameError').classList.add('show');
                document.getElementById('username').classList.add('error');
                hasError = true;
            }

            if (!validateEmail(email)) {
                document.getElementById('emailError').classList.add('show');
                document.getElementById('email').classList.add('error');
                hasError = true;
            }

            if (password.length < 6) {
                document.getElementById('passwordError').classList.add('show');
                document.getElementById('password').classList.add('error');
                hasError = true;
            }

            if (password !== confirmPassword) {
                document.getElementById('confirmPasswordError').classList.add('show');
                document.getElementById('confirmPassword').classList.add('error');
                hasError = true;
            }

            if (hasError) return;

            // 调用后端注册接口
            submitBtn.classList.add('loading');
            submitBtn.disabled = true;

            try {
                const response = await fetch(`${API_BASE}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.detail || '注册失败');
                }

                // 注册成功，自动登录获取 token
                const loginRes = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const loginData = await loginRes.json();

                if (loginRes.ok) {
                    localStorage.setItem('token', loginData.access_token);
                    localStorage.setItem('userEmail', email);
                }

                showToast('注册成功！正在跳转到问卷调查...', 'success');

                setTimeout(() => {
                    window.location.href = 'survey.html';
                }, 1500);

            } catch (err) {
                submitBtn.classList.remove('loading');
                submitBtn.disabled = false;
                showToast(err.message, 'error');
            }
        }

        // 检查是否已登录
        window.addEventListener('load', function() {
            const token = localStorage.getItem('token');
            if (token) {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
